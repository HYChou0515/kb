[project]
name = "kb-api"
version = "1.0.0"
description = "Thin HTTP wrapper over cognee v1 (remember / recall / search / improve / forget)."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "cognee[fastembed]>=1.0",
    "sentence-transformers>=3.0",
    "fastapi>=0.111",
    "uvicorn[standard]>=0.30",
    "httpx>=0.27",
    "pydantic>=2.7",
    "python-dotenv>=1.0.1",
    "mcp>=1.2",
]

[project.scripts]
kb-api = "rca.main:run"
embedding-server = "embedding_server.main:run"
kb-mcp = "rca.adapter.in_.mcp_kb:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rca", "src/embedding_server"]

[tool.uv]
package = true
