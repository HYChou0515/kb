[project]
name = "rca-ui"
version = "1.0.0"
description = "NiceGUI chat + OpenAI Agents SDK runtime. Spawns four MCP stdio subprocesses (filesystem / kb-mcp / wafer-data-mcp / stats-algo-mcp) for the agent's tools."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "nicegui>=2.10",
    "openai-agents>=0.15",
    "pydantic>=2.7",
    "python-dotenv>=1.0.1",
    "mcp>=1.2",
    # fab MCPs (only the agent uses them, but they ship with rca-ui)
    "pandas>=2.2",
    "numpy>=1.26",
    "scipy>=1.13",
]

[project.scripts]
rca-ui = "rca_ui.main:run"
wafer-data-mcp = "mcp_servers.wafer_data_mcp:main"
stats-algo-mcp = "mcp_servers.stats_algo_mcp:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rca_ui", "src/mcp_servers"]

[tool.uv]
package = true
