<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="sans-serif" font-size="12">
  <title>TDDB Weibull Plot 與壽命外推</title>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="500" y="22" text-anchor="middle" font-weight="bold" font-size="15">TDDB Weibull Plot：從加速應力外推工作條件下的壽命</text>

  <!-- Left panel: Weibull plot -->
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="440" height="380" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="220" y="20" text-anchor="middle" font-weight="bold" font-size="13">Weibull Plot（加速應力資料）</text>

    <!-- Axes -->
    <line x1="60" y1="320" x2="420" y2="320" stroke="#37474f" stroke-width="1.5"/>
    <line x1="60" y1="40" x2="60" y2="320" stroke="#37474f" stroke-width="1.5"/>

    <!-- X axis label (log time) -->
    <text x="240" y="350" text-anchor="middle" font-size="11" fill="#37474f">ln(t_BD)</text>
    <text x="80" y="335" font-size="9" fill="#666">小</text>
    <text x="380" y="335" font-size="9" fill="#666">大（壽命長）</text>

    <!-- Y axis label -->
    <text x="20" y="180" text-anchor="middle" font-size="11" fill="#37474f" transform="rotate(-90 20 180)">ln(-ln(1-F))</text>
    <text x="42" y="50" text-anchor="end" font-size="9" fill="#666">99%</text>
    <text x="42" y="180" text-anchor="end" font-size="9" fill="#666">63%</text>
    <text x="42" y="310" text-anchor="end" font-size="9" fill="#666">1%</text>

    <!-- Failure threshold line -->
    <line x1="60" y1="280" x2="420" y2="280" stroke="#d32f2f" stroke-width="0.8" stroke-dasharray="3,2"/>
    <text x="425" y="283" font-size="9" fill="#d32f2f">0.01% target</text>

    <!-- Weibull data line (slope = β) -->
    <line x1="120" y1="290" x2="320" y2="60" stroke="#0d47a1" stroke-width="2"/>

    <!-- Data points -->
    <circle cx="135" cy="280" r="4" fill="#0d47a1"/>
    <circle cx="155" cy="265" r="4" fill="#0d47a1"/>
    <circle cx="175" cy="250" r="4" fill="#0d47a1"/>
    <circle cx="200" cy="225" r="4" fill="#0d47a1"/>
    <circle cx="225" cy="195" r="4" fill="#0d47a1"/>
    <circle cx="250" cy="170" r="4" fill="#0d47a1"/>
    <circle cx="280" cy="135" r="4" fill="#0d47a1"/>
    <circle cx="305" cy="100" r="4" fill="#0d47a1"/>

    <!-- η point -->
    <circle cx="260" cy="180" r="6" fill="#bf360c" stroke="#000" stroke-width="0.5"/>
    <text x="266" y="170" font-size="10" fill="#bf360c">η（characteristic life）</text>

    <!-- Slope annotation -->
    <text x="190" y="155" font-size="11" fill="#0d47a1" font-weight="bold">slope = β</text>
    <text x="190" y="170" font-size="9" fill="#0d47a1">（Weibull shape）</text>

    <!-- Extrapolation arrow -->
    <line x1="320" y1="60" x2="400" y2="-20" stroke="#1b5e20" stroke-width="1.5" stroke-dasharray="3,2"/>

    <!-- Area legends -->
    <rect x="70" y="55" width="14" height="14" fill="#0d47a1"/>
    <text x="90" y="66" font-size="10" fill="#444">加速應力下實測 fail 點</text>

    <line x1="70" y1="80" x2="84" y2="80" stroke="#1b5e20" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="90" y="83" font-size="10" fill="#444">外推到工作條件</text>
  </g>

  <!-- Right panel: extrapolation -->
  <g transform="translate(500, 60)">
    <rect x="0" y="0" width="460" height="380" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="230" y="20" text-anchor="middle" font-weight="bold" font-size="13">壽命外推：加速 → 工作條件</text>

    <text x="20" y="50" font-size="11" font-weight="bold" fill="#0d47a1">加速 stress 條件：</text>
    <text x="30" y="68" font-size="10" fill="#444">▶ 電場 E：1–4 MV/cm（工作條件 0.2 MV/cm）</text>
    <text x="30" y="84" font-size="10" fill="#444">▶ 溫度 T：125–200 °C（工作條件 100 °C）</text>
    <text x="30" y="100" font-size="10" fill="#444">▶ 加速因子：千倍 ~ 百萬倍</text>

    <text x="20" y="130" font-size="11" font-weight="bold" fill="#0d47a1">兩種主流外推 model：</text>

    <text x="30" y="155" font-size="10" font-weight="bold" fill="#444">E-model（保守）：</text>
    <text x="40" y="170" font-size="10" font-family="serif" font-style="italic" fill="#666">t_BD ∝ exp(−γE) · exp(Eₐ/kT)</text>

    <text x="30" y="195" font-size="10" font-weight="bold" fill="#444">Power-law（樂觀）：</text>
    <text x="40" y="210" font-size="10" font-family="serif" font-style="italic" fill="#666">t_BD ∝ E⁻ⁿ · exp(Eₐ/kT)</text>

    <text x="20" y="245" font-size="11" font-weight="bold" fill="#bf360c">業界目標：</text>
    <text x="30" y="263" font-size="10" fill="#444">在工作條件下，</text>
    <text x="30" y="279" font-size="10" fill="#444"><tspan font-weight="bold">0.01% die fail 的時間 &gt; 10 年</tspan></text>

    <text x="20" y="310" font-size="11" font-weight="bold" fill="#0d47a1">Weibull β slope 解讀：</text>
    <text x="30" y="328" font-size="10" fill="#444">▶ β &gt; 1：wear-out（EM/TDDB 屬此類）</text>
    <text x="30" y="344" font-size="10" fill="#444">▶ β = 1：random fail</text>
    <text x="30" y="360" font-size="10" fill="#444">▶ β &lt; 1：infant mortality（早期 fail，缺陷批次）</text>
  </g>

  <!-- Bottom note -->
  <g transform="translate(40, 460)">
    <text x="460" y="0" text-anchor="middle" font-size="10" fill="#666" font-style="italic">→ Weibull β 是「**缺陷分布特徵**」 —— β 突然變小 = 出現 systematic infant mortality，**lot 級警報**</text>
  </g>
</svg>
