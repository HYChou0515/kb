<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" font-family="sans-serif" font-size="12">
  <title>Cu Damascene 完整 Stack：barrier、liner、Cu fill、cap</title>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="500" y="22" text-anchor="middle" font-weight="bold" font-size="15">Cu Damascene Stack：barrier / liner / Cu / cap 各層分工</text>
  <text x="500" y="40" text-anchor="middle" font-size="11" fill="#555">Cu 必須被完整包覆 —— 任何缺口都是長期可靠度災難</text>

  <!-- Cross-section -->
  <g transform="translate(80, 70)">
    <rect x="0" y="0" width="450" height="320" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="225" y="22" text-anchor="middle" font-weight="bold" font-size="13">Cu Trench Cross-section</text>

    <!-- Lower ILD -->
    <rect x="20" y="220" width="410" height="80" fill="#bbdefb" stroke="#0d47a1"/>
    <text x="225" y="270" text-anchor="middle" font-size="11" fill="#0d47a1">下層 ILD（Low-k）</text>

    <!-- Cap layer (bottom on lower line) -->
    <rect x="20" y="214" width="410" height="6" fill="#a5d6a7" stroke="#1b5e20"/>
    <text x="430" y="220" font-size="9" fill="#1b5e20">SiCN / Co cap</text>

    <!-- ILD around trench -->
    <rect x="20" y="80" width="100" height="134" fill="#bbdefb" stroke="#0d47a1"/>
    <rect x="330" y="80" width="100" height="134" fill="#bbdefb" stroke="#0d47a1"/>

    <!-- Trench profile（穿透） -->
    <!-- Inner contour for the trench - filled stack -->

    <!-- Outer dark stripe for TaN (barrier) -->
    <rect x="116" y="80" width="220" height="138" fill="#3e2723"/>
    <text x="116" y="76" font-size="9" fill="#3e2723" font-weight="bold">TaN</text>

    <!-- Next layer for Ta (adhesion) -->
    <rect x="120" y="84" width="212" height="130" fill="#5d4037"/>
    <text x="120" y="80" font-size="9" fill="#5d4037">Ta</text>

    <!-- Optional Co liner (orange-ish) -->
    <rect x="124" y="88" width="204" height="122" fill="#ff7043"/>
    <text x="335" y="90" font-size="9" fill="#bf360c">Co liner</text>

    <!-- Cu fill (large center) -->
    <rect x="128" y="92" width="196" height="114" fill="#ff8a65" stroke="#bf360c"/>
    <text x="226" y="155" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Cu Fill</text>

    <!-- Cap on top -->
    <rect x="116" y="74" width="220" height="6" fill="#a5d6a7" stroke="#1b5e20"/>
    <text x="226" y="69" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="bold">Cap Layer（SiCN / Co cap）</text>

    <!-- Hard mask above -->
    <rect x="20" y="60" width="410" height="14" fill="#ce93d8" stroke="#4a148c"/>
    <text x="100" y="71" font-size="9" fill="#4a148c">Hard mask</text>

    <!-- Annotations / arrows -->
    <line x1="115" y1="160" x2="80" y2="160" stroke="#3e2723" stroke-width="0.8" marker-end="url(#arrA)"/>
    <text x="78" y="158" text-anchor="end" font-size="9" fill="#3e2723">TaN（barrier）</text>
    <text x="78" y="170" text-anchor="end" font-size="8" fill="#666">擋 Cu 擴散</text>

    <line x1="119" y1="180" x2="80" y2="190" stroke="#5d4037" stroke-width="0.8" marker-end="url(#arrA)"/>
    <text x="78" y="190" text-anchor="end" font-size="9" fill="#5d4037">Ta（liner）</text>
    <text x="78" y="200" text-anchor="end" font-size="8" fill="#666">Cu 黏附</text>

    <line x1="125" y1="100" x2="60" y2="100" stroke="#bf360c" stroke-width="0.8" marker-end="url(#arrA)"/>
    <text x="58" y="100" text-anchor="end" font-size="9" fill="#bf360c">Co liner</text>
    <text x="58" y="110" text-anchor="end" font-size="8" fill="#666">改善 EM</text>

    <line x1="335" y1="240" x2="380" y2="240" stroke="#1b5e20" stroke-width="0.8"/>
    <text x="380" y="244" font-size="9" fill="#1b5e20">下層 cap</text>
  </g>

  <!-- Right: each layer's role -->
  <g transform="translate(560, 80)" font-size="10">
    <text x="0" y="0" font-size="13" font-weight="bold" fill="#37474f">每層的角色</text>

    <text x="0" y="32" font-weight="bold" fill="#3e2723">TaN（5–8 nm）</text>
    <text x="10" y="48" fill="#666">▶ Diffusion barrier</text>
    <text x="10" y="62" fill="#666">▶ 緻密非晶相，擋 Cu</text>
    <text x="10" y="76" fill="#666">▶ ALD 比 PVD coverage 好</text>

    <text x="0" y="106" font-weight="bold" fill="#5d4037">Ta（2–3 nm）</text>
    <text x="10" y="122" fill="#666">▶ Cu 黏附介面</text>
    <text x="10" y="136" fill="#666">▶ ECP seed 沉積基底</text>

    <text x="0" y="166" font-weight="bold" fill="#bf360c">Co liner（1–2 nm，可選）</text>
    <text x="10" y="182" fill="#666">▶ N7+ 的 EM 改善</text>
    <text x="10" y="196" fill="#666">▶ Cu/Co 介面 EM 慢</text>

    <text x="0" y="226" font-weight="bold" fill="#bf360c">Cu Fill（trench 中央）</text>
    <text x="10" y="242" fill="#666">▶ ECP（電鍍）填滿</text>
    <text x="10" y="256" fill="#666">▶ 主導電金屬</text>

    <text x="0" y="286" font-weight="bold" fill="#1b5e20">Cap（SiCN 5–10 nm 或 Co cap）</text>
    <text x="10" y="302" fill="#666">▶ 上方 barrier</text>
    <text x="10" y="316" fill="#666">▶ Cu/cap 介面是 EM 主路徑</text>
  </g>

  <!-- Bottom: failure modes -->
  <g transform="translate(80, 410)">
    <rect x="0" y="0" width="840" height="40" fill="#ffebee" stroke="#c62828"/>
    <text x="10" y="22" font-size="11" font-weight="bold" fill="#c62828">任一層缺陷 → reliability 災難：</text>
    <text x="220" y="22" font-size="10" fill="#444">TaN 缺口 → Cu diffusion → TDDB 早夭　　Ta 黏附差 → Cu void　　Cap pinhole → EM 加速</text>
  </g>

  <defs>
    <marker id="arrA" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M10,0 L0,5 L10,10 z" fill="#37474f"/>
    </marker>
  </defs>
</svg>
