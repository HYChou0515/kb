<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="sans-serif" font-size="12">
  <title>Electromigration（EM）：void 與 hillock 形成</title>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="500" y="22" text-anchor="middle" font-weight="bold" font-size="15">Electromigration：高電流密度下 Cu 原子被電子衝走</text>
  <text x="500" y="40" text-anchor="middle" font-size="11" fill="#555">時間累積 → upstream void、downstream hillock</text>

  <!-- Time = 0 -->
  <g transform="translate(20, 70)">
    <rect x="0" y="0" width="280" height="160" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="140" y="20" text-anchor="middle" font-weight="bold" font-size="13">t = 0（剛投入運作）</text>

    <!-- ILD around -->
    <rect x="20" y="50" width="240" height="50" fill="#bbdefb" fill-opacity="0.5"/>

    <!-- Cu line -->
    <rect x="20" y="65" width="240" height="20" fill="#ff7043" stroke="#bf360c"/>
    <text x="140" y="79" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">Cu line（均勻）</text>

    <!-- Electron flow arrows -->
    <line x1="40" y1="115" x2="240" y2="115" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrB)"/>
    <text x="140" y="130" text-anchor="middle" font-size="10" fill="#1565c0">電子流方向 →</text>
    <text x="140" y="148" text-anchor="middle" font-size="9" fill="#666">高電流密度 J</text>
  </g>

  <!-- Time = 數年（高電流操作後） -->
  <g transform="translate(320, 70)">
    <rect x="0" y="0" width="280" height="160" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="140" y="20" text-anchor="middle" font-weight="bold" font-size="13">數年後（電子衝動量累積）</text>

    <rect x="20" y="50" width="240" height="50" fill="#bbdefb" fill-opacity="0.5"/>

    <!-- Cu line with void upstream and hillock downstream -->
    <rect x="20" y="65" width="240" height="20" fill="#ff7043" stroke="#bf360c"/>

    <!-- Void on upstream side -->
    <rect x="40" y="68" width="20" height="14" fill="#ffffff" stroke="#d32f2f" stroke-width="2"/>
    <text x="50" y="60" text-anchor="middle" font-size="9" fill="#d32f2f" font-weight="bold">void</text>
    <text x="50" y="98" text-anchor="middle" font-size="8" fill="#d32f2f">原子流失</text>

    <!-- Hillock on downstream side -->
    <rect x="200" y="55" width="40" height="40" fill="#ff7043" stroke="#bf360c"/>
    <text x="220" y="78" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">hillock</text>
    <text x="220" y="48" text-anchor="middle" font-size="8" fill="#bf360c">原子堆積</text>

    <!-- Atom flow arrows showing migration -->
    <line x1="65" y1="92" x2="190" y2="92" stroke="#bf360c" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#arrR)"/>
    <text x="125" y="112" text-anchor="middle" font-size="9" fill="#bf360c">Cu 原子被衝向下游</text>

    <!-- Electrons -->
    <line x1="40" y1="135" x2="240" y2="135" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrB)"/>
    <text x="140" y="148" text-anchor="middle" font-size="9" fill="#1565c0">電子流（持續）</text>
  </g>

  <!-- Time = MTTF -->
  <g transform="translate(620, 70)">
    <rect x="0" y="0" width="280" height="160" fill="#fff3e0" stroke="#bf360c" stroke-width="1.5"/>
    <text x="140" y="20" text-anchor="middle" font-weight="bold" font-size="13" fill="#bf360c">MTTF：失效</text>

    <rect x="20" y="50" width="240" height="50" fill="#bbdefb" fill-opacity="0.5"/>

    <!-- Cu line with broken section -->
    <rect x="20" y="65" width="35" height="20" fill="#ff7043" stroke="#bf360c"/>
    <rect x="80" y="65" width="160" height="20" fill="#ff7043" stroke="#bf360c"/>

    <!-- Big void = open -->
    <rect x="55" y="68" width="25" height="14" fill="#ffffff" stroke="#d32f2f" stroke-width="2.5"/>
    <text x="68" y="60" text-anchor="middle" font-size="10" fill="#d32f2f" font-weight="bold">⚡ open ⚡</text>

    <!-- Big hillock breaking cap -->
    <rect x="195" y="48" width="50" height="50" fill="#ff7043" stroke="#bf360c"/>
    <line x1="220" y1="48" x2="220" y2="35" stroke="#d32f2f" stroke-width="2"/>
    <text x="220" y="30" text-anchor="middle" font-size="9" fill="#d32f2f" font-weight="bold">穿破 cap</text>

    <text x="140" y="130" text-anchor="middle" font-size="10" fill="#bf360c">線阻飆 / 開路 / short to 上層</text>
    <text x="140" y="148" text-anchor="middle" font-size="9" fill="#666">使用者看到「**晶片用 N 年後突然壞**」</text>
  </g>

  <!-- Black's Equation -->
  <g transform="translate(60, 270)">
    <rect x="0" y="0" width="380" height="180" fill="#e3f2fd" stroke="#0d47a1"/>
    <text x="10" y="22" font-size="13" font-weight="bold" fill="#0d47a1">Black's Equation：EM 壽命公式</text>

    <text x="20" y="55" font-size="14" fill="#444" font-family="serif" font-style="italic">MTTF = A · J⁻ⁿ · exp(Eₐ / kT)</text>

    <text x="10" y="86" font-size="11" fill="#444">參數：</text>
    <text x="20" y="104" font-size="10" fill="#666">▶ J = 電流密度（每 cm² 安培數）</text>
    <text x="20" y="120" font-size="10" fill="#666">▶ T = 絕對溫度</text>
    <text x="20" y="136" font-size="10" fill="#666">▶ Eₐ = 活化能（材料相依，Cu ~ 1.0 eV）</text>
    <text x="20" y="152" font-size="10" fill="#666">▶ n = 電流密度指數（典型 1–2）</text>
    <text x="20" y="168" font-size="10" fill="#666">▶ A = 預指數因子</text>
  </g>

  <!-- Sensitivity -->
  <g transform="translate(460, 270)">
    <rect x="0" y="0" width="480" height="180" fill="#fff3e0" stroke="#bf360c"/>
    <text x="10" y="22" font-size="13" font-weight="bold" fill="#bf360c">EM 對 J 與 T 極度敏感</text>

    <text x="10" y="48" font-size="11" font-weight="bold" fill="#444">電流密度</text>
    <text x="20" y="64" font-size="10" fill="#666">J 增加 2 倍 → 壽命 ÷ 4</text>

    <text x="10" y="90" font-size="11" font-weight="bold" fill="#444">溫度</text>
    <text x="20" y="106" font-size="10" fill="#666">T 上升 10 °C → 壽命減半</text>

    <text x="10" y="135" font-size="11" font-weight="bold" fill="#bf360c">→ 工程對策：</text>
    <text x="20" y="151" font-size="10" fill="#444">▶ 設計：增加線寬、multi-via 分擔電流</text>
    <text x="20" y="167" font-size="10" fill="#444">▶ 製程：金屬 cap（Co cap）改善 Cu/cap 介面 EM</text>
  </g>

  <defs>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#bf360c"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1565c0"/>
    </marker>
  </defs>
</svg>
