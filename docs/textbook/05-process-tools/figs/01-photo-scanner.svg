<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="sans-serif" font-size="12">
  <title>Photolithography Scanner 架構</title>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="450" y="22" text-anchor="middle" font-weight="bold" font-size="15">Photolithography Scanner：把 reticle 圖案投影到 wafer 上</text>

  <!-- Main schematic -->
  <g transform="translate(180, 60)">
    <!-- Light source -->
    <rect x="200" y="0" width="120" height="50" rx="8" fill="#fdd835" stroke="#bf360c" stroke-width="1.5"/>
    <text x="260" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#bf360c">Light Source</text>
    <text x="260" y="38" text-anchor="middle" font-size="9" fill="#bf360c">DUV (193 nm) / EUV (13.5 nm)</text>

    <!-- Light beam down to reticle -->
    <line x1="260" y1="50" x2="260" y2="100" stroke="#fdd835" stroke-width="3" marker-end="url(#arrY2)"/>

    <!-- Reticle -->
    <rect x="180" y="100" width="160" height="14" fill="#37474f"/>
    <text x="260" y="111" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">Reticle（光罩）</text>
    <!-- Pattern on reticle -->
    <line x1="200" y1="106" x2="208" y2="106" stroke="#fff" stroke-width="2"/>
    <line x1="220" y1="106" x2="228" y2="106" stroke="#fff" stroke-width="2"/>
    <line x1="240" y1="106" x2="248" y2="106" stroke="#fff" stroke-width="2"/>
    <line x1="260" y1="106" x2="268" y2="106" stroke="#fff" stroke-width="2"/>
    <line x1="280" y1="106" x2="288" y2="106" stroke="#fff" stroke-width="2"/>
    <line x1="300" y1="106" x2="308" y2="106" stroke="#fff" stroke-width="2"/>

    <!-- Pellicle -->
    <rect x="180" y="118" width="160" height="3" fill="#bdbdbd" opacity="0.6"/>
    <text x="350" y="123" font-size="9" fill="#666">Pellicle（保護膜）</text>

    <!-- Light goes through reticle to lens -->
    <line x1="220" y1="121" x2="240" y2="160" stroke="#fdd835" stroke-width="1.5" stroke-dasharray="2,2"/>
    <line x1="260" y1="121" x2="260" y2="160" stroke="#fdd835" stroke-width="1.5" stroke-dasharray="2,2"/>
    <line x1="300" y1="121" x2="280" y2="160" stroke="#fdd835" stroke-width="1.5" stroke-dasharray="2,2"/>

    <!-- Reduction lens (4x reduction) -->
    <ellipse cx="260" cy="180" rx="80" ry="20" fill="#bbdefb" stroke="#0d47a1" stroke-width="1.5"/>
    <text x="260" y="184" text-anchor="middle" font-size="11" font-weight="bold" fill="#0d47a1">Reduction Lens (4×)</text>

    <!-- Light focused down to wafer -->
    <line x1="240" y1="200" x2="252" y2="260" stroke="#fdd835" stroke-width="2" marker-end="url(#arrY2)"/>
    <line x1="260" y1="200" x2="260" y2="260" stroke="#fdd835" stroke-width="2" marker-end="url(#arrY2)"/>
    <line x1="280" y1="200" x2="268" y2="260" stroke="#fdd835" stroke-width="2" marker-end="url(#arrY2)"/>

    <!-- Wafer with photoresist -->
    <rect x="160" y="270" width="200" height="14" fill="#ff9800" stroke="#bf360c"/>
    <text x="380" y="280" font-size="10" fill="#bf360c">Photoresist</text>

    <rect x="120" y="284" width="280" height="20" fill="#cfd8dc" stroke="#37474f"/>
    <text x="260" y="298" text-anchor="middle" font-size="11" fill="#263238" font-weight="bold">Wafer（在 stage 上）</text>

    <!-- Stage -->
    <rect x="100" y="304" width="320" height="16" fill="#90a4ae" stroke="#37474f"/>
    <text x="260" y="316" text-anchor="middle" font-size="10" fill="#fff">Wafer Stage（精準移動）</text>

    <!-- Slit / scanner motion arrows -->
    <line x1="260" y1="335" x2="380" y2="335" stroke="#d32f2f" stroke-width="1.5" marker-end="url(#arrR2)"/>
    <text x="320" y="350" text-anchor="middle" font-size="10" fill="#d32f2f">Scanner 掃描方向</text>
  </g>

  <!-- Right side annotations -->
  <g transform="translate(620, 80)" font-size="10">
    <text x="0" y="0" font-size="13" font-weight="bold" fill="#37474f">關鍵控制參數</text>

    <text x="0" y="28" font-weight="bold" fill="#bf360c">▶ Dose</text>
    <text x="10" y="44" fill="#666">光阻接受到的能量</text>
    <text x="10" y="58" fill="#666">飄 → CD 飄</text>

    <text x="0" y="86" font-weight="bold" fill="#bf360c">▶ Focus</text>
    <text x="10" y="102" fill="#666">透鏡與 wafer 距離</text>
    <text x="10" y="116" fill="#666">飄 → CD / profile 飄</text>

    <text x="0" y="144" font-weight="bold" fill="#bf360c">▶ Overlay</text>
    <text x="10" y="160" fill="#666">與前層對位精度</text>
    <text x="10" y="174" fill="#666">N3 要求 &lt; 2 nm 3σ</text>

    <text x="0" y="202" font-weight="bold" fill="#bf360c">▶ Edge Bead</text>
    <text x="10" y="218" fill="#666">光阻邊緣堆積</text>
    <text x="10" y="232" fill="#666">EBR 不全 → edge fail</text>
  </g>

  <!-- Bottom: tool fingerprints -->
  <g transform="translate(60, 410)">
    <rect x="0" y="0" width="780" height="100" fill="#fff8e1" stroke="#f57f17"/>
    <text x="10" y="22" font-size="13" font-weight="bold" fill="#bf360c">Scanner 的 Wafer Fingerprint</text>

    <text x="20" y="48" font-size="10" fill="#444"><tspan font-weight="bold">線狀（垂直/水平）</tspan>：Slit 掃描方向不均</text>
    <text x="20" y="64" font-size="10" fill="#444"><tspan font-weight="bold">同心圓</tspan>：Wafer warpage + autofocus 補償不足</text>
    <text x="20" y="80" font-size="10" fill="#444"><tspan font-weight="bold">Edge ring</tspan>：EBR 不全</text>

    <text x="420" y="48" font-size="10" fill="#444"><tspan font-weight="bold">Cluster（特定 die）</tspan>：Reticle defect / pellicle 髒</text>
    <text x="420" y="64" font-size="10" fill="#444"><tspan font-weight="bold">Half-moon</tspan>：Stage tilt / scanner 校正偏</text>
    <text x="420" y="80" font-size="10" fill="#444"><tspan font-weight="bold">Random rare</tspan>：光源 instability、resist particle</text>
  </g>

  <defs>
    <marker id="arrY2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#fdd835"/>
    </marker>
    <marker id="arrR2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d32f2f"/>
    </marker>
  </defs>
</svg>
