<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" font-family="sans-serif" font-size="12">
  <title>CVD vs ALD vs PVD 沉積機制對比</title>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="500" y="22" text-anchor="middle" font-weight="bold" font-size="15">三大沉積技術：CVD vs ALD vs PVD</text>

  <!-- CVD panel -->
  <g transform="translate(20, 60)">
    <rect x="0" y="0" width="320" height="280" fill="#fff3e0" stroke="#bf360c" stroke-width="1.5"/>
    <text x="160" y="22" text-anchor="middle" font-weight="bold" font-size="13" fill="#bf360c">CVD（Chemical Vapor Deposition）</text>

    <!-- Gas inlet -->
    <text x="160" y="46" text-anchor="middle" font-size="10" fill="#bf360c">前驅氣體 + 反應氣體</text>

    <!-- Arrows down (gas flow) -->
    <line x1="100" y1="56" x2="100" y2="100" stroke="#bf360c" stroke-width="1.5" marker-end="url(#arrR4)"/>
    <line x1="160" y1="56" x2="160" y2="100" stroke="#bf360c" stroke-width="1.5" marker-end="url(#arrR4)"/>
    <line x1="220" y1="56" x2="220" y2="100" stroke="#bf360c" stroke-width="1.5" marker-end="url(#arrR4)"/>

    <!-- Reaction zone -->
    <rect x="40" y="100" width="240" height="50" fill="#ffe0b2" fill-opacity="0.5"/>
    <text x="160" y="120" text-anchor="middle" font-size="10" fill="#bf360c">表面反應</text>
    <text x="160" y="138" text-anchor="middle" font-size="9" fill="#666">SiH4 + O2 → SiO2 + ...</text>

    <!-- Wafer with deposition (uneven on 3D) -->
    <rect x="40" y="220" width="240" height="20" fill="#cfd8dc" stroke="#37474f"/>

    <!-- Trench in wafer -->
    <rect x="100" y="180" width="40" height="40" fill="none" stroke="#37474f" stroke-width="1"/>

    <!-- CVD coverage: thicker on top, thinner in trench bottom -->
    <path d="M 40,170 L 100,170 L 105,200 L 135,200 L 140,170 L 280,170"
          fill="none" stroke="#ff7043" stroke-width="3"/>
    <text x="40" y="262" font-size="9" fill="#666">→ 表面厚、trench 底部薄</text>
    <text x="40" y="276" font-size="9" fill="#666">→ Step coverage 中等</text>
  </g>

  <!-- ALD panel -->
  <g transform="translate(350, 60)">
    <rect x="0" y="0" width="300" height="280" fill="#e8f5e9" stroke="#1b5e20" stroke-width="1.5"/>
    <text x="150" y="22" text-anchor="middle" font-weight="bold" font-size="13" fill="#1b5e20">ALD（Atomic Layer Deposition）</text>

    <!-- 4-step cycle visualization -->
    <text x="150" y="44" text-anchor="middle" font-size="10" fill="#1b5e20">Self-limiting cycle（4 步）</text>

    <text x="20" y="68" font-size="10" font-weight="bold" fill="#1b5e20">① Pulse A：</text>
    <text x="100" y="68" font-size="9" fill="#666">飽和吸附一層</text>

    <text x="20" y="86" font-weight="bold" fill="#1b5e20" font-size="10">② Purge：</text>
    <text x="100" y="86" font-size="9" fill="#666">趕走多餘 A</text>

    <text x="20" y="104" font-weight="bold" fill="#1b5e20" font-size="10">③ Pulse B：</text>
    <text x="100" y="104" font-size="9" fill="#666">與 A 反應，飽和</text>

    <text x="20" y="122" font-weight="bold" fill="#1b5e20" font-size="10">④ Purge：</text>
    <text x="100" y="122" font-size="9" fill="#666">趕走多餘 B</text>

    <text x="150" y="148" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="bold">↓ 一個 cycle = ~0.1 nm</text>
    <text x="150" y="164" text-anchor="middle" font-size="10" fill="#1b5e20">重複 N cycles → 達目標厚度</text>

    <!-- Wafer with PERFECT conformal coverage -->
    <rect x="30" y="220" width="240" height="20" fill="#cfd8dc" stroke="#37474f"/>
    <rect x="90" y="180" width="40" height="40" fill="none" stroke="#37474f" stroke-width="1"/>

    <!-- ALD coverage: equally thick everywhere -->
    <path d="M 30,178 L 92,178 L 92,218 L 128,218 L 128,178 L 270,178"
          fill="none" stroke="#43a047" stroke-width="3"/>

    <text x="30" y="262" font-size="9" fill="#666">→ 完美保形（conformal）</text>
    <text x="30" y="276" font-size="9" fill="#666">→ 速度慢、cost 高</text>
  </g>

  <!-- PVD panel -->
  <g transform="translate(660, 60)">
    <rect x="0" y="0" width="320" height="280" fill="#e3f2fd" stroke="#0d47a1" stroke-width="1.5"/>
    <text x="160" y="22" text-anchor="middle" font-weight="bold" font-size="13" fill="#0d47a1">PVD（Physical Vapor Deposition）</text>

    <!-- Target -->
    <rect x="80" y="44" width="160" height="14" fill="#5d4037"/>
    <text x="160" y="55" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">Target（如 Ta、Cu）</text>

    <!-- Ar+ ions hitting target -->
    <text x="100" y="78" font-size="10" fill="#0d47a1">Ar+</text>
    <line x1="100" y1="80" x2="100" y2="58" stroke="#0d47a1" stroke-width="1.5" marker-end="url(#arrUpB)"/>
    <text x="220" y="78" font-size="10" fill="#0d47a1">Ar+</text>
    <line x1="220" y1="80" x2="220" y2="58" stroke="#0d47a1" stroke-width="1.5" marker-end="url(#arrUpB)"/>

    <!-- Atoms sputtered down -->
    <line x1="120" y1="58" x2="100" y2="160" stroke="#bf360c" stroke-width="1.5" stroke-dasharray="2,1"/>
    <line x1="160" y1="58" x2="160" y2="160" stroke="#bf360c" stroke-width="1.5" marker-end="url(#arrR4)"/>
    <line x1="200" y1="58" x2="220" y2="160" stroke="#bf360c" stroke-width="1.5" stroke-dasharray="2,1"/>

    <text x="280" y="120" font-size="9" fill="#bf360c">→ 飛行</text>

    <!-- Wafer -->
    <rect x="40" y="220" width="240" height="20" fill="#cfd8dc" stroke="#37474f"/>
    <rect x="100" y="180" width="40" height="40" fill="none" stroke="#37474f" stroke-width="1"/>

    <!-- PVD coverage: top coverage, near-zero bottom -->
    <path d="M 40,170 L 280,170"
          fill="none" stroke="#42a5f5" stroke-width="4"/>
    <line x1="100" y1="180" x2="100" y2="200" stroke="#42a5f5" stroke-width="1.5"/>
    <line x1="140" y1="180" x2="140" y2="200" stroke="#42a5f5" stroke-width="1.5"/>
    <text x="120" y="218" text-anchor="middle" font-size="8" fill="#0d47a1">幾乎沒到底</text>

    <text x="40" y="262" font-size="9" fill="#666">→ 表面厚、trench 底部極薄</text>
    <text x="40" y="276" font-size="9" fill="#666">→ Step coverage 差</text>
  </g>

  <!-- Bottom: applications -->
  <g transform="translate(20, 360)">
    <rect x="0" y="0" width="960" height="160" fill="#f3e5f5" stroke="#6a1b9a"/>
    <text x="10" y="22" font-size="13" font-weight="bold" fill="#4a148c">應用對照</text>

    <text x="20" y="50" font-size="11" font-weight="bold" fill="#bf360c">CVD：</text>
    <text x="80" y="50" font-size="10" fill="#444">ILD、low-k、Si3N4 spacer、polysilicon、cap</text>

    <text x="20" y="74" font-size="11" font-weight="bold" fill="#1b5e20">ALD：</text>
    <text x="80" y="74" font-size="10" fill="#444">High-k（HfO2）、TaN barrier、TiN cap、先進 spacer</text>

    <text x="20" y="98" font-size="11" font-weight="bold" fill="#0d47a1">PVD：</text>
    <text x="80" y="98" font-size="10" fill="#444">BEOL liner / barrier（Ta/TaN）、Cu seed、Al pad</text>

    <text x="20" y="130" font-size="10" fill="#666" font-style="italic">→ 三者選擇取決於：step coverage 需求、厚度精度、throughput、cost</text>
    <text x="20" y="146" font-size="10" fill="#666" font-style="italic">→ 先進製程逐漸把 PVD 換成 ALD（因為 step coverage 在高 AR 結構撐不住）</text>
  </g>

  <defs>
    <marker id="arrR4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#bf360c"/>
    </marker>
    <marker id="arrUpB" viewBox="0 0 10 10" refX="5" refY="0" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,10 L5,0 L10,10 z" fill="#0d47a1"/>
    </marker>
  </defs>
</svg>
