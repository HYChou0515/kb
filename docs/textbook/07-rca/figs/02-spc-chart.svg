<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" font-family="sans-serif" font-size="12">
  <title>SPC Control Chart 與異常 pattern</title>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="500" y="22" text-anchor="middle" font-weight="bold" font-size="15">SPC Control Chart：辨識常見異常 pattern</text>
  <text x="500" y="40" text-anchor="middle" font-size="11" fill="#555">In control 不只是「**在 ± 3σ 內**」，還要看點的分布</text>

  <!-- Chart frame -->
  <g transform="translate(60, 70)">
    <rect x="0" y="0" width="880" height="380" fill="#fafafa" stroke="#bdbdbd"/>

    <!-- Y axis -->
    <line x1="60" y1="20" x2="60" y2="350" stroke="#37474f" stroke-width="1.5"/>
    <text x="35" y="180" text-anchor="middle" font-size="11" fill="#37474f" transform="rotate(-90 35 180)">Measured value</text>

    <!-- X axis -->
    <line x1="60" y1="350" x2="860" y2="350" stroke="#37474f" stroke-width="1.5"/>
    <text x="460" y="375" text-anchor="middle" font-size="11" fill="#37474f">Time / Sample number →</text>

    <!-- UCL / LCL / Mean lines -->
    <line x1="60" y1="60" x2="860" y2="60" stroke="#d32f2f" stroke-width="1" stroke-dasharray="6,3"/>
    <text x="65" y="55" font-size="9" fill="#d32f2f">UCL (mean + 3σ)</text>

    <line x1="60" y1="180" x2="860" y2="180" stroke="#1b5e20" stroke-width="1.5"/>
    <text x="65" y="175" font-size="9" fill="#1b5e20">Mean</text>

    <line x1="60" y1="300" x2="860" y2="300" stroke="#d32f2f" stroke-width="1" stroke-dasharray="6,3"/>
    <text x="65" y="315" font-size="9" fill="#d32f2f">LCL (mean − 3σ)</text>

    <!-- 2σ lines (faint) -->
    <line x1="60" y1="100" x2="860" y2="100" stroke="#ff9800" stroke-width="0.5" stroke-dasharray="3,2"/>
    <line x1="60" y1="260" x2="860" y2="260" stroke="#ff9800" stroke-width="0.5" stroke-dasharray="3,2"/>

    <!-- Region 1: Normal -->
    <g>
      <text x="120" y="45" font-size="11" fill="#1b5e20" font-weight="bold">In Control</text>
      <circle cx="80" cy="170" r="3" fill="#1b5e20"/>
      <circle cx="100" cy="190" r="3" fill="#1b5e20"/>
      <circle cx="120" cy="160" r="3" fill="#1b5e20"/>
      <circle cx="140" cy="200" r="3" fill="#1b5e20"/>
      <circle cx="160" cy="175" r="3" fill="#1b5e20"/>
      <circle cx="180" cy="195" r="3" fill="#1b5e20"/>
    </g>

    <!-- Region 2: Single point > 3σ (Rule 1) -->
    <g>
      <line x1="200" y1="20" x2="200" y2="350" stroke="#bbb" stroke-dasharray="2,2"/>
      <text x="240" y="45" font-size="11" fill="#d32f2f" font-weight="bold">Rule 1：&gt; 3σ</text>
      <circle cx="220" cy="170" r="3" fill="#1b5e20"/>
      <circle cx="240" cy="180" r="3" fill="#1b5e20"/>
      <circle cx="260" cy="55" r="6" fill="#d32f2f" stroke="#000"/>
      <text x="260" y="40" text-anchor="middle" font-size="9" fill="#d32f2f">⚡</text>
      <circle cx="280" cy="175" r="3" fill="#1b5e20"/>
      <circle cx="300" cy="190" r="3" fill="#1b5e20"/>
    </g>

    <!-- Region 3: 7 points one side (Rule 2) -->
    <g>
      <line x1="320" y1="20" x2="320" y2="350" stroke="#bbb" stroke-dasharray="2,2"/>
      <text x="370" y="45" font-size="11" fill="#d32f2f" font-weight="bold">Rule 2：連續 7 點同側</text>
      <circle cx="335" cy="155" r="4" fill="#d32f2f"/>
      <circle cx="350" cy="150" r="4" fill="#d32f2f"/>
      <circle cx="365" cy="145" r="4" fill="#d32f2f"/>
      <circle cx="380" cy="155" r="4" fill="#d32f2f"/>
      <circle cx="395" cy="148" r="4" fill="#d32f2f"/>
      <circle cx="410" cy="140" r="4" fill="#d32f2f"/>
      <circle cx="425" cy="152" r="4" fill="#d32f2f"/>
    </g>

    <!-- Region 4: trend (Rule 3) -->
    <g>
      <line x1="445" y1="20" x2="445" y2="350" stroke="#bbb" stroke-dasharray="2,2"/>
      <text x="500" y="45" font-size="11" fill="#d32f2f" font-weight="bold">Rule 3：單調 trend</text>
      <circle cx="460" cy="200" r="4" fill="#d32f2f"/>
      <circle cx="475" cy="190" r="4" fill="#d32f2f"/>
      <circle cx="490" cy="178" r="4" fill="#d32f2f"/>
      <circle cx="505" cy="165" r="4" fill="#d32f2f"/>
      <circle cx="520" cy="150" r="4" fill="#d32f2f"/>
      <circle cx="535" cy="135" r="4" fill="#d32f2f"/>
      <circle cx="550" cy="120" r="4" fill="#d32f2f"/>
      <line x1="455" y1="205" x2="555" y2="115" stroke="#d32f2f" stroke-width="0.8" stroke-dasharray="2,2"/>
    </g>

    <!-- Region 5: Step change -->
    <g>
      <line x1="570" y1="20" x2="570" y2="350" stroke="#bbb" stroke-dasharray="2,2"/>
      <text x="640" y="45" font-size="11" fill="#d32f2f" font-weight="bold">Step Change（PM 後突發）</text>
      <circle cx="585" cy="180" r="4" fill="#1b5e20"/>
      <circle cx="600" cy="175" r="4" fill="#1b5e20"/>
      <circle cx="615" cy="185" r="4" fill="#1b5e20"/>
      <line x1="630" y1="20" x2="630" y2="350" stroke="#d32f2f" stroke-width="0.5" stroke-dasharray="3,2"/>
      <text x="635" y="32" font-size="9" fill="#d32f2f">PM</text>
      <circle cx="645" cy="120" r="4" fill="#d32f2f"/>
      <circle cx="660" cy="115" r="4" fill="#d32f2f"/>
      <circle cx="675" cy="125" r="4" fill="#d32f2f"/>
      <circle cx="690" cy="118" r="4" fill="#d32f2f"/>
      <circle cx="705" cy="122" r="4" fill="#d32f2f"/>
    </g>

    <!-- Region 6: oscillation -->
    <g>
      <line x1="730" y1="20" x2="730" y2="350" stroke="#bbb" stroke-dasharray="2,2"/>
      <text x="790" y="45" font-size="11" fill="#d32f2f" font-weight="bold">Rule 4：振盪</text>
      <circle cx="745" cy="140" r="4" fill="#d32f2f"/>
      <circle cx="760" cy="220" r="4" fill="#d32f2f"/>
      <circle cx="775" cy="135" r="4" fill="#d32f2f"/>
      <circle cx="790" cy="225" r="4" fill="#d32f2f"/>
      <circle cx="805" cy="138" r="4" fill="#d32f2f"/>
      <circle cx="820" cy="222" r="4" fill="#d32f2f"/>
      <circle cx="835" cy="142" r="4" fill="#d32f2f"/>
      <line x1="745" y1="140" x2="835" y2="142" stroke="#d32f2f" stroke-width="0.5" stroke-dasharray="2,2"/>
      <line x1="760" y1="220" x2="820" y2="222" stroke="#d32f2f" stroke-width="0.5" stroke-dasharray="2,2"/>
    </g>
  </g>

  <!-- Bottom: interpretation -->
  <g transform="translate(60, 470)">
    <rect x="0" y="0" width="880" height="60" fill="#f3e5f5" stroke="#6a1b9a"/>
    <text x="10" y="22" font-size="12" font-weight="bold" fill="#4a148c">物理對應：</text>
    <text x="20" y="42" font-size="10" fill="#444">▶ <tspan font-weight="bold">Step change</tspan>：突發事件（PM、recipe release、化學品換批）　　▶ <tspan font-weight="bold">Trend / drift</tspan>：耗材老化（pad wear、lamp aging）</text>
    <text x="20" y="56" font-size="10" fill="#444">▶ <tspan font-weight="bold">7 點同側</tspan>：製程 mean 偏移　　▶ <tspan font-weight="bold">振盪</tspan>：systematic 因子（multi-chamber、shift change）</text>
  </g>
</svg>
