<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" font-family="sans-serif" font-size="12">
  <title>Brightfield vs Darkfield Inspection</title>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="500" y="22" text-anchor="middle" font-weight="bold" font-size="15">KLA Brightfield vs Darkfield 物理對比</text>

  <!-- Brightfield panel -->
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="440" height="240" fill="#fff8e1" stroke="#bf360c" stroke-width="1.5"/>
    <text x="220" y="22" text-anchor="middle" font-weight="bold" font-size="13" fill="#bf360c">Brightfield Inspection</text>

    <!-- Light source -->
    <circle cx="220" cy="55" r="14" fill="#fdd835" stroke="#bf360c"/>
    <text x="220" y="60" text-anchor="middle" font-size="11" fill="#bf360c" font-weight="bold">光源</text>

    <!-- Vertical light rays down -->
    <line x1="180" y1="80" x2="180" y2="160" stroke="#fdd835" stroke-width="1.5" marker-end="url(#arrY)"/>
    <line x1="220" y1="80" x2="220" y2="160" stroke="#fdd835" stroke-width="1.5" marker-end="url(#arrY)"/>
    <line x1="260" y1="80" x2="260" y2="160" stroke="#fdd835" stroke-width="1.5" marker-end="url(#arrY)"/>

    <!-- Wafer -->
    <rect x="100" y="160" width="240" height="20" fill="#cfd8dc" stroke="#37474f"/>
    <!-- A particle on wafer -->
    <circle cx="240" cy="160" r="3" fill="#bf360c"/>

    <!-- Reflection rays up (mirror reflection) -->
    <line x1="180" y1="160" x2="180" y2="80" stroke="#fdd835" stroke-width="1.5" stroke-dasharray="3,2"/>
    <line x1="220" y1="160" x2="220" y2="80" stroke="#fdd835" stroke-width="1.5" stroke-dasharray="3,2"/>
    <line x1="260" y1="160" x2="260" y2="80" stroke="#fdd835" stroke-width="1.5" stroke-dasharray="3,2"/>

    <!-- Detector -->
    <rect x="160" y="35" width="120" height="14" fill="#0d47a1" stroke="#000"/>
    <text x="220" y="46" text-anchor="middle" font-size="9" fill="#fff">偵測器（收正反射光）</text>

    <text x="220" y="195" text-anchor="middle" font-size="10" fill="#37474f">Wafer</text>
    <text x="100" y="220" font-size="10" fill="#444">機制：</text>
    <text x="20" y="234" font-size="10" fill="#666">缺陷改變反射 → 看「**亮度差異**」</text>
  </g>

  <!-- Darkfield panel -->
  <g transform="translate(520, 60)">
    <rect x="0" y="0" width="440" height="240" fill="#e8f5e9" stroke="#1b5e20" stroke-width="1.5"/>
    <text x="220" y="22" text-anchor="middle" font-weight="bold" font-size="13" fill="#1b5e20">Darkfield Inspection</text>

    <!-- Light source on side -->
    <circle cx="80" cy="80" r="14" fill="#fdd835" stroke="#bf360c"/>
    <text x="80" y="85" text-anchor="middle" font-size="10" fill="#bf360c" font-weight="bold">光源</text>

    <!-- Oblique light rays -->
    <line x1="100" y1="95" x2="200" y2="160" stroke="#fdd835" stroke-width="1.5" marker-end="url(#arrY)"/>
    <line x1="100" y1="105" x2="220" y2="160" stroke="#fdd835" stroke-width="1.5" marker-end="url(#arrY)"/>

    <!-- Wafer -->
    <rect x="100" y="160" width="240" height="20" fill="#cfd8dc" stroke="#37474f"/>

    <!-- Particle -->
    <circle cx="220" cy="160" r="3" fill="#bf360c"/>

    <!-- Mirror reflection (avoids detector) -->
    <line x1="200" y1="160" x2="320" y2="100" stroke="#fdd835" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="335" y="95" font-size="9" fill="#666">鏡面反射</text>
    <text x="335" y="108" font-size="9" fill="#666">（離開偵測器）</text>

    <!-- Scattering from particle (radial) -->
    <line x1="220" y1="158" x2="220" y2="50" stroke="#1b5e20" stroke-width="1.5" marker-end="url(#arrG)"/>
    <line x1="220" y1="158" x2="180" y2="60" stroke="#1b5e20" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="220" y1="158" x2="260" y2="60" stroke="#1b5e20" stroke-width="1" stroke-dasharray="2,2"/>

    <!-- Detector above particle -->
    <rect x="180" y="35" width="80" height="14" fill="#1b5e20"/>
    <text x="220" y="46" text-anchor="middle" font-size="9" fill="#fff">偵測器</text>

    <text x="220" y="195" text-anchor="middle" font-size="10" fill="#37474f">Wafer</text>
    <text x="220" y="215" text-anchor="middle" font-size="10" fill="#1b5e20">↑ 只接收散射光</text>
    <text x="100" y="234" font-size="10" fill="#444">機制：缺陷產生散射 → 偵測「**亮點**」</text>
  </g>

  <!-- Comparison table at bottom -->
  <g transform="translate(40, 320)">
    <rect x="0" y="0" width="920" height="120" fill="#f3e5f5" stroke="#6a1b9a"/>
    <text x="10" y="22" font-size="13" font-weight="bold" fill="#4a148c">兩者強弱項對比</text>

    <!-- Headers -->
    <text x="20" y="48" font-size="11" font-weight="bold" fill="#444">用途</text>
    <text x="350" y="48" font-size="11" font-weight="bold" fill="#bf360c">Brightfield</text>
    <text x="600" y="48" font-size="11" font-weight="bold" fill="#1b5e20">Darkfield</text>

    <!-- Rows -->
    <text x="20" y="68" font-size="10" fill="#444">大形貌變化（pattern fail、large CD shift）</text>
    <text x="350" y="68" font-size="10" fill="#444">✓ 強</text>
    <text x="600" y="68" font-size="10" fill="#666">△ 弱</text>

    <text x="20" y="84" font-size="10" fill="#444">小顆粒（&lt; 50 nm）</text>
    <text x="350" y="84" font-size="10" fill="#666">✗ 漏</text>
    <text x="600" y="84" font-size="10" fill="#444">✓ 極強（可達 30 nm）</text>

    <text x="20" y="100" font-size="10" fill="#444">表面異物 / 污染</text>
    <text x="350" y="100" font-size="10" fill="#666">△ 中</text>
    <text x="600" y="100" font-size="10" fill="#444">✓ 強</text>
  </g>

  <text x="500" y="455" text-anchor="middle" font-size="10" fill="#666" font-style="italic">→ 兩者互補使用：先 darkfield 抓 particle，再 brightfield 抓 pattern issue</text>

  <defs>
    <marker id="arrY" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#fdd835"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1b5e20"/>
    </marker>
  </defs>
</svg>
