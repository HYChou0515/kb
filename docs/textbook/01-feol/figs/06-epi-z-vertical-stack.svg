<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" font-family="sans-serif" font-size="12">
  <title>EPI 的完整 Z 方向鄰居：從 substrate 到 bond pad</title>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <!-- Master title -->
  <text x="500" y="22" text-anchor="middle" font-weight="bold" font-size="15">EPI 在 Z 方向的完整鄰居堆疊</text>
  <text x="500" y="40" text-anchor="middle" font-size="11" fill="#555">向上接到外部世界，向下回到 substrate</text>

  <!-- ============ Center column: Full vertical stack ============ -->
  <g transform="translate(380, 60)">

    <!-- Bond pad -->
    <rect x="0" y="0" width="200" height="32" fill="#ffd54f" stroke="#bf360c" stroke-width="1.5"/>
    <text x="100" y="20" text-anchor="middle" font-size="12" fill="#bf360c" font-weight="bold">Bond Pad (Al / Cu)</text>

    <!-- Passivation -->
    <rect x="0" y="32" width="200" height="20" fill="#bcaaa4" stroke="#3e2723"/>
    <text x="100" y="46" text-anchor="middle" font-size="10" fill="#3e2723">Passivation (SiN / SiO₂)</text>

    <!-- BEOL M15 -->
    <rect x="0" y="52" width="200" height="22" fill="#90caf9" stroke="#0d47a1"/>
    <text x="100" y="67" text-anchor="middle" font-size="11" fill="#0d47a1">M15</text>

    <!-- V14 -->
    <line x1="100" y1="74" x2="100" y2="84" stroke="#0d47a1" stroke-width="3"/>
    <text x="120" y="80" font-size="9" fill="#0d47a1">V14</text>

    <!-- BEOL middle (compressed) -->
    <rect x="0" y="84" width="200" height="80" fill="#bbdefb" stroke="#0d47a1" stroke-dasharray="3,2"/>
    <text x="100" y="115" text-anchor="middle" font-size="11" fill="#0d47a1" font-weight="bold">M14 — V13 — M13 — ...</text>
    <text x="100" y="132" text-anchor="middle" font-size="11" fill="#0d47a1">— V2 — M2 — V1</text>
    <text x="100" y="155" text-anchor="middle" font-size="9" fill="#0d47a1" font-style="italic">(BEOL 多層金屬，壓縮顯示)</text>

    <!-- M1 -->
    <rect x="0" y="164" width="200" height="22" fill="#90caf9" stroke="#0d47a1"/>
    <text x="100" y="179" text-anchor="middle" font-size="11" fill="#0d47a1">M1</text>

    <!-- V0 -->
    <line x1="100" y1="186" x2="100" y2="196" stroke="#0d47a1" stroke-width="3"/>
    <text x="120" y="192" font-size="9" fill="#0d47a1">V0</text>

    <!-- M0 -->
    <rect x="0" y="196" width="200" height="22" fill="#90caf9" stroke="#0d47a1"/>
    <text x="100" y="211" text-anchor="middle" font-size="11" fill="#0d47a1">M0</text>

    <!-- MOL section starts -->
    <line x1="-15" y1="218" x2="215" y2="218" stroke="#1b5e20" stroke-width="0.8" stroke-dasharray="6,3"/>
    <text x="-25" y="222" text-anchor="end" font-size="10" fill="#1b5e20" font-weight="bold">MOL ↑ / BEOL ↓</text>

    <!-- V0 (MOL) -->
    <rect x="80" y="218" width="40" height="20" fill="#a5d6a7" stroke="#1b5e20"/>
    <text x="100" y="232" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="bold">V0</text>

    <!-- MD -->
    <rect x="80" y="238" width="40" height="40" fill="#a5d6a7" stroke="#1b5e20"/>
    <text x="100" y="262" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="bold">MD (W/Co)</text>

    <!-- ILD0 / ILD1 around MD -->
    <rect x="0" y="218" width="80" height="60" fill="#bbdefb" fill-opacity="0.5" stroke="#0d47a1"/>
    <rect x="120" y="218" width="80" height="60" fill="#bbdefb" fill-opacity="0.5" stroke="#0d47a1"/>
    <text x="40" y="252" text-anchor="middle" font-size="10" fill="#0d47a1">ILD</text>
    <text x="160" y="252" text-anchor="middle" font-size="10" fill="#0d47a1">ILD</text>

    <!-- Silicide -->
    <rect x="80" y="278" width="40" height="6" fill="#ff8a65" stroke="#bf360c"/>
    <text x="125" y="283" font-size="9" fill="#bf360c">silicide</text>

    <!-- FEOL section starts -->
    <line x1="-15" y1="284" x2="215" y2="284" stroke="#bf360c" stroke-width="0.8" stroke-dasharray="6,3"/>
    <text x="-25" y="288" text-anchor="end" font-size="10" fill="#bf360c" font-weight="bold">FEOL 結束 ↑</text>

    <!-- CESL line -->
    <path d="M 0,290 L 60,290 L 80,275 L 120,275 L 140,290 L 200,290" fill="none" stroke="#388e3c" stroke-width="1.2" stroke-dasharray="2,1.5"/>
    <text x="125" y="297" font-size="9" fill="#388e3c">CESL</text>

    <!-- EPI (the star) -->
    <polygon points="100,260 130,290 100,310 70,290" fill="#7e57c2" stroke="#311b92" stroke-width="2"/>
    <text x="100" y="294" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">★</text>
    <text x="100" y="304" text-anchor="middle" font-size="9" fill="#fff">EPI</text>

    <!-- Star marker outside -->
    <text x="160" y="295" font-size="11" fill="#311b92" font-weight="bold">★ S/D EPI（你要追蹤的）</text>

    <!-- Fin remnant -->
    <rect x="92" y="310" width="16" height="20" fill="#ffe082" stroke="#bf360c"/>
    <text x="125" y="322" font-size="9" fill="#bf360c">fin 殘餘 Si</text>

    <!-- Substrate -->
    <rect x="0" y="330" width="200" height="50" fill="#cfd8dc" stroke="#37474f" stroke-width="1.5"/>
    <text x="100" y="358" text-anchor="middle" font-size="12" fill="#263238" font-weight="bold">Si Substrate</text>
    <text x="100" y="372" text-anchor="middle" font-size="9" fill="#263238" font-style="italic">(整片 wafer 75% 都是這個)</text>

  </g>

  <!-- ============ Left column: Z+ side annotations ============ -->
  <g transform="translate(40, 60)">
    <text x="160" y="14" text-anchor="middle" font-weight="bold" font-size="13" fill="#0d47a1">↑ Z+ 上方（接外部）</text>

    <!-- Annotations pointing right to the stack -->
    <g font-size="10" fill="#0d47a1">
      <text x="0" y="20">⑫ <tspan font-weight="bold">Bond pad</tspan>：與外界接腳</text>
      <text x="0" y="35">⑪ <tspan font-weight="bold">M15</tspan>：最頂層金屬</text>
      <text x="0" y="50">— V14, M14, V13, ... V1</text>
      <text x="0" y="65">— BEOL 多層金屬（Cu damascene）</text>
      <text x="0" y="80">— 厚度 ~3–5 µm</text>
      <text x="0" y="100">⑩ <tspan font-weight="bold">M1</tspan></text>
      <text x="0" y="115">⑩ <tspan font-weight="bold">M0</tspan>：最底層金屬</text>
    </g>

    <g font-size="10" fill="#1b5e20">
      <text x="0" y="160">⑨ <tspan font-weight="bold">V0</tspan>：第一個 via，連 M0 與 MD</text>
      <text x="0" y="180">⑧ <tspan font-weight="bold">MD（W / Co）</tspan>：S/D 接觸窗</text>
      <text x="0" y="200">⑦ <tspan font-weight="bold">Silicide（TiSiₓ）</tspan>：金屬-Si 介面</text>
    </g>

    <g font-size="10" fill="#bf360c">
      <text x="0" y="232">⑤–⑥ <tspan font-weight="bold">CESL → ILD0 / ILD1</tspan></text>
      <text x="0" y="247">（FEOL 結束時 EPI 上方就是這層）</text>
    </g>

    <g font-size="10" fill="#311b92">
      <text x="0" y="270" font-weight="bold">★ EPI（PEPI / NEPI）— 起點 ★</text>
    </g>

    <g font-size="10" fill="#bf360c">
      <text x="0" y="295">① <tspan font-weight="bold">fin 殘餘 Si</tspan>（recess 沒挖到底）</text>
      <text x="0" y="310">② <tspan font-weight="bold">Substrate Si</tspan>（wafer 主體）</text>
      <text x="0" y="325">— 厚度 775 µm</text>
    </g>
  </g>

  <!-- ============ Right column: scale + key insight ============ -->
  <g transform="translate(620, 60)">
    <rect x="0" y="0" width="350" height="320" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
    <text x="10" y="22" font-size="13" font-weight="bold" fill="#bf360c">尺度量級</text>

    <text x="20" y="46" font-size="11" fill="#444">Bond pad：~1–2 µm 厚</text>
    <text x="20" y="64" font-size="11" fill="#444">BEOL 全段（M0–M15）：~3–5 µm</text>
    <text x="20" y="82" font-size="11" fill="#444">MOL（MD + V0 + silicide）：~0.1–0.2 µm</text>
    <text x="20" y="100" font-size="11" fill="#444">FEOL 整層厚度：~1 µm</text>
    <text x="20" y="118" font-size="11" fill="#444"><tspan font-weight="bold">→ EPI 之上總厚度：~5–10 µm</tspan></text>
    <text x="20" y="136" font-size="11" fill="#444">EPI 之下（substrate）：<tspan font-weight="bold">~775 µm</tspan></text>

    <text x="10" y="170" font-size="13" font-weight="bold" fill="#bf360c">關鍵觀念</text>
    <text x="20" y="190" font-size="11" fill="#444">EPI 在 wafer 中的位置：</text>
    <text x="20" y="208" font-size="11" fill="#444"><tspan font-weight="bold">頂部 5–10 µm（電路）</tspan> 與</text>
    <text x="20" y="226" font-size="11" fill="#444"><tspan font-weight="bold">下方 775 µm（基底）</tspan> 的交界</text>
    <text x="20" y="244" font-size="11" fill="#444">→ 元件全部擠在 wafer 最頂部</text>
    <text x="20" y="262" font-size="11" fill="#444">　 薄薄一層裡</text>

    <text x="10" y="290" font-size="11" fill="#bf360c" font-style="italic">→ Z+ 整條路徑 = 「把 S/D 訊號帶出晶片」</text>
    <text x="10" y="305" font-size="11" fill="#bf360c" font-style="italic">　 整個 MOL + BEOL 都在做這件事</text>
  </g>

  <!-- ============ Bottom: Time evolution table ============ -->
  <g transform="translate(20, 410)">
    <rect x="0" y="0" width="960" height="240" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1"/>
    <text x="10" y="22" font-size="13" font-weight="bold" fill="#4a148c">EPI 上方（Z+）隨製程的演化</text>

    <text x="10" y="48" font-size="11" fill="#444">① <tspan font-weight="bold">Ch 6 結束（S/D epi 剛長完）</tspan>：上方還是空氣（製程中間態）</text>
    <text x="10" y="68" font-size="11" fill="#444">② <tspan font-weight="bold">Ch 7（CESL 沉積）</tspan>：薄薄一層 SiN 順著 epi 菱形包覆</text>
    <text x="10" y="88" font-size="11" fill="#444">③ <tspan font-weight="bold">Ch 7（ILD0 沉積 + CMP）</tspan>：厚厚一層 SiO₂ 填到 dummy gate 高度</text>
    <text x="10" y="108" font-size="11" fill="#444">④ <tspan font-weight="bold">FEOL 結束（Ch 8 / 9）</tspan>：S/D 區域維持 CESL → ILD0 不動</text>
    <text x="10" y="128" font-size="11" fill="#444">⑤–⑥ <tspan font-weight="bold">MOL Ch 1–2（ILD1 + MD etch）</tspan>：MD photo 開 trench、停在 EPI 上方的 CESL</text>
    <text x="10" y="148" font-size="11" fill="#444">⑦ <tspan font-weight="bold">MOL Ch 3（silicide）</tspan>：Ti 與 EPI 反應，成 TiSiₓ → 接觸電阻大幅降低</text>
    <text x="10" y="168" font-size="11" fill="#444">⑧ <tspan font-weight="bold">MOL Ch 4（MD fill）</tspan>：W / Co 填入 trench → 上方第一條金屬完成</text>
    <text x="10" y="188" font-size="11" fill="#444">⑨ <tspan font-weight="bold">MOL Ch 5（V0）</tspan>：via 把 MD 接到 BEOL 入口</text>
    <text x="10" y="208" font-size="11" fill="#444">⑩–⑫ <tspan font-weight="bold">BEOL（M0 → M15）+ Pad</tspan>：層層金屬連線疊上去，最後接 bond pad → 外部世界</text>
    <text x="10" y="232" font-size="11" fill="#1b5e20" font-style="italic">→ 整顆 chip 做完後，從 EPI 往上是一條由 12+ 層金屬與介電組成的「對外接線通道」。</text>
  </g>
</svg>
