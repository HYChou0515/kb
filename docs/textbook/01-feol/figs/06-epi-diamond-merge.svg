<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="sans-serif" font-size="12">
  <title>S/D Epi 菱形剖面 與 Epi Merge 缺陷</title>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <!-- ===== Panel 1: Single epi diamond on a fin ===== -->
  <g transform="translate(20, 20)">
    <text x="170" y="0" text-anchor="middle" font-weight="bold" font-size="14">單顆磊晶：菱形剖面</text>
    <text x="170" y="18" text-anchor="middle" font-size="11" fill="#666">沿 {111} 面成長 · 與 (100) 表面夾角 54.7°</text>

    <!-- Substrate -->
    <rect x="20" y="220" width="300" height="50" fill="#cfd8dc" stroke="#37474f"/>
    <text x="170" y="252" text-anchor="middle" font-size="11" fill="#263238">Si Substrate (100)</text>

    <!-- Fin -->
    <rect x="160" y="180" width="20" height="40" fill="#ffe082" stroke="#bf360c"/>
    <text x="170" y="290" text-anchor="middle" font-size="10" fill="#bf360c">fin (Si)</text>

    <!-- Diamond epi -->
    <polygon points="170,120 230,180 170,210 110,180" fill="#b39ddb" stroke="#311b92" stroke-width="1.5"/>
    <text x="170" y="158" text-anchor="middle" font-size="11" fill="#fff">SiGe / SiP</text>
    <text x="170" y="173" text-anchor="middle" font-size="10" fill="#fff">epi</text>

    <!-- {111} face labels -->
    <text x="208" y="138" font-size="10" fill="#311b92">{111}</text>
    <line x1="200" y1="148" x2="218" y2="142" stroke="#311b92" stroke-width="0.5"/>

    <text x="105" y="138" text-anchor="end" font-size="10" fill="#311b92">{111}</text>
    <line x1="115" y1="148" x2="100" y2="142" stroke="#311b92" stroke-width="0.5"/>

    <!-- Angle label -->
    <path d="M 175,180 A 12,12 0 0 1 169,170" fill="none" stroke="#d32f2f" stroke-width="1"/>
    <text x="190" y="178" font-size="10" fill="#d32f2f">54.7°</text>

    <!-- Caption -->
    <text x="170" y="320" text-anchor="middle" font-size="10" fill="#444">{111} 面表面能量最低，磊晶傾向沿這些面結束</text>
    <text x="170" y="335" text-anchor="middle" font-size="10" fill="#444">→ 自然形成菱形 / 鑽石型 (rhombic / diamond) 剖面</text>
  </g>

  <!-- Divider -->
  <line x1="385" y1="40" x2="385" y2="350" stroke="#bbb" stroke-dasharray="4,4"/>

  <!-- ===== Panel 2: Multi-fin epi merge ===== -->
  <g transform="translate(410, 20)">
    <text x="160" y="0" text-anchor="middle" font-weight="bold" font-size="14">Epi Merge：S-S/D-D Short</text>
    <text x="160" y="18" text-anchor="middle" font-size="11" fill="#666">相鄰 fin 的菱形長過頭、橫向相黏</text>

    <!-- Substrate -->
    <rect x="0" y="220" width="320" height="50" fill="#cfd8dc" stroke="#37474f"/>
    <text x="160" y="252" text-anchor="middle" font-size="11" fill="#263238">Si Substrate</text>

    <!-- 3 fins -->
    <rect x="50" y="180" width="14" height="40" fill="#ffe082" stroke="#bf360c"/>
    <rect x="153" y="180" width="14" height="40" fill="#ffe082" stroke="#bf360c"/>
    <rect x="256" y="180" width="14" height="40" fill="#ffe082" stroke="#bf360c"/>

    <!-- 3 enlarged epi diamonds that merge -->
    <polygon points="57,120 110,180 57,210 4,180" fill="#b39ddb" stroke="#311b92"/>
    <polygon points="160,120 213,180 160,210 107,180" fill="#b39ddb" stroke="#311b92"/>
    <polygon points="263,120 316,180 263,210 210,180" fill="#b39ddb" stroke="#311b92"/>

    <!-- Merge highlight -->
    <circle cx="108" cy="180" r="10" fill="none" stroke="#d32f2f" stroke-width="2.5"/>
    <circle cx="211" cy="180" r="10" fill="none" stroke="#d32f2f" stroke-width="2.5"/>
    <text x="108" y="148" text-anchor="middle" font-size="10" fill="#d32f2f" font-weight="bold">MERGE</text>
    <text x="211" y="148" text-anchor="middle" font-size="10" fill="#d32f2f" font-weight="bold">MERGE</text>

    <!-- Lightning to indicate short -->
    <text x="105" y="195" text-anchor="middle" font-size="14" fill="#d32f2f" font-weight="bold">⚡</text>
    <text x="208" y="195" text-anchor="middle" font-size="14" fill="#d32f2f" font-weight="bold">⚡</text>

    <!-- Caption -->
    <text x="160" y="295" text-anchor="middle" font-size="10" fill="#444">兩個本應獨立的電晶體 S/D 變相連 → 整顆元件失效</text>
    <text x="160" y="310" text-anchor="middle" font-size="10" fill="#444">先進製程 fin pitch 收緊後，merge 風險顯著上升</text>
    <text x="160" y="325" text-anchor="middle" font-size="10" fill="#444">解法：epi 條件控制（厚度、selectivity、loading）+ DRC 規則</text>
  </g>

  <!-- Legend -->
  <g transform="translate(20, 360)">
    <rect x="0" y="0" width="14" height="14" fill="#ffe082" stroke="#bf360c"/>
    <text x="20" y="11" font-size="11">Si fin</text>
    <rect x="100" y="0" width="14" height="14" fill="#b39ddb" stroke="#311b92"/>
    <text x="120" y="11" font-size="11">S/D Epi (SiGe / SiP)</text>
    <rect x="280" y="0" width="14" height="14" fill="#cfd8dc" stroke="#37474f"/>
    <text x="300" y="11" font-size="11">Si Substrate</text>
  </g>
</svg>
