<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="sans-serif" font-size="12">
  <title>S/D / Channel / Gate / Spacer — 三個視角</title>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <!-- Master title -->
  <text x="500" y="22" text-anchor="middle" font-weight="bold" font-size="15">S / D / Channel / Gate / Spacer 的 3D 結構</text>
  <text x="500" y="40" text-anchor="middle" font-size="11" fill="#555">同一個結構從三個視角看</text>

  <!-- ============ VIEW 1: Top view ============ -->
  <g transform="translate(20, 60)">
    <rect x="0" y="0" width="300" height="220" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="150" y="20" text-anchor="middle" font-weight="bold" font-size="13">視角 1：俯視 (top view)</text>
    <text x="150" y="36" text-anchor="middle" font-size="10" fill="#555">從晶圓上方往下看</text>

    <!-- Coordinate axes -->
    <line x1="20" y1="195" x2="50" y2="195" stroke="#888" stroke-width="1" marker-end="url(#axis)"/>
    <text x="55" y="198" font-size="10" fill="#888">X (沿 fin)</text>
    <line x1="20" y1="195" x2="20" y2="170" stroke="#888" stroke-width="1" marker-end="url(#axis)"/>
    <text x="14" y="165" font-size="10" fill="#888">Y</text>

    <!-- Fin: horizontal stripe (in X direction) -->
    <rect x="40" y="100" width="240" height="14" fill="#ffe082" stroke="#bf360c"/>
    <text x="40" y="95" font-size="9" fill="#bf360c">fin</text>

    <!-- S/D epi (left end of fin) -->
    <rect x="40" y="92" width="60" height="30" fill="#b39ddb" stroke="#311b92"/>
    <text x="70" y="111" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">S</text>

    <!-- S/D epi (right end of fin) -->
    <rect x="220" y="92" width="60" height="30" fill="#b39ddb" stroke="#311b92"/>
    <text x="250" y="111" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">D</text>

    <!-- Channel section (middle, original Si) -->
    <text x="160" y="111" text-anchor="middle" font-size="10" fill="#bf360c">channel (Si)</text>

    <!-- Gate stripe (vertical, in Y direction) -->
    <rect x="130" y="60" width="60" height="100" fill="#7e57c2" fill-opacity="0.85" stroke="#311b92"/>
    <text x="160" y="75" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">GATE</text>
    <text x="160" y="88" text-anchor="middle" font-size="9" fill="#fff">stripe</text>

    <!-- Spacers (vertical lines on each side of gate) -->
    <rect x="124" y="60" width="6" height="100" fill="#ffe0b2" stroke="#bf360c"/>
    <rect x="190" y="60" width="6" height="100" fill="#ffe0b2" stroke="#bf360c"/>

    <!-- Annotations -->
    <text x="100" y="50" font-size="10" fill="#bf360c">↓ spacer</text>
    <line x1="118" y1="55" x2="125" y2="62" stroke="#bf360c" stroke-width="0.5"/>

    <text x="200" y="50" font-size="10" fill="#bf360c">↓ spacer</text>
    <line x1="207" y1="55" x2="195" y2="62" stroke="#bf360c" stroke-width="0.5"/>

    <!-- Cut line indicators showing where the other views slice -->
    <line x1="40" y1="143" x2="280" y2="143" stroke="#d32f2f" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="285" y="146" font-size="9" fill="#d32f2f">視角 2 切面</text>

    <line x1="160" y1="60" x2="160" y2="160" stroke="#d32f2f" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="160" y="175" text-anchor="middle" font-size="9" fill="#d32f2f">視角 3 切面</text>
  </g>

  <!-- ============ VIEW 2: Side view (along channel, X-Z plane) ============ -->
  <g transform="translate(340, 60)">
    <rect x="0" y="0" width="320" height="220" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="160" y="20" text-anchor="middle" font-weight="bold" font-size="13">視角 2：沿 fin 方向切開 (X-Z)</text>
    <text x="160" y="36" text-anchor="middle" font-size="10" fill="#555">沿著 fin 切下去，看 S/D-channel-S/D</text>

    <line x1="20" y1="195" x2="50" y2="195" stroke="#888" stroke-width="1" marker-end="url(#axis)"/>
    <text x="55" y="198" font-size="10" fill="#888">X</text>
    <line x1="20" y1="195" x2="20" y2="170" stroke="#888" stroke-width="1" marker-end="url(#axis)"/>
    <text x="14" y="165" font-size="10" fill="#888">Z</text>

    <!-- Substrate -->
    <rect x="40" y="170" width="270" height="20" fill="#cfd8dc" stroke="#37474f"/>
    <text x="175" y="184" text-anchor="middle" font-size="9" fill="#263238">Si Substrate</text>

    <!-- Fin/channel section in middle -->
    <rect x="155" y="140" width="40" height="30" fill="#ffe082" stroke="#bf360c"/>
    <text x="175" y="158" text-anchor="middle" font-size="9" fill="#bf360c">channel</text>

    <!-- S/D epi (left) - diamond shape extending up -->
    <polygon points="105,135 130,158 105,170 80,158 80,135" fill="#b39ddb" stroke="#311b92"/>
    <text x="100" y="155" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">S/D</text>
    <text x="100" y="167" text-anchor="middle" font-size="8" fill="#fff">epi</text>

    <!-- S/D epi (right) -->
    <polygon points="245,135 270,158 245,170 220,158 220,135" fill="#b39ddb" stroke="#311b92"/>
    <text x="245" y="155" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">S/D</text>
    <text x="245" y="167" text-anchor="middle" font-size="8" fill="#fff">epi</text>

    <!-- Gate body (above channel) -->
    <rect x="155" y="80" width="40" height="60" fill="#7e57c2" fill-opacity="0.85" stroke="#311b92"/>
    <text x="175" y="115" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">GATE</text>

    <!-- Hard mask on top (in Ch 5; later removed) -->
    <rect x="155" y="65" width="40" height="14" fill="#ce93d8" stroke="#4a148c"/>
    <text x="175" y="76" text-anchor="middle" font-size="9" fill="#4a148c">cap/HM</text>

    <!-- Spacers on each side of gate (vertical walls) -->
    <rect x="143" y="65" width="12" height="105" fill="#ffe0b2" stroke="#bf360c"/>
    <rect x="195" y="65" width="12" height="105" fill="#ffe0b2" stroke="#bf360c"/>
    <text x="125" y="100" font-size="9" fill="#bf360c">spacer</text>
    <line x1="142" y1="100" x2="148" y2="100" stroke="#bf360c" stroke-width="0.5"/>

    <text x="225" y="100" font-size="9" fill="#bf360c">spacer</text>
    <line x1="207" y1="100" x2="222" y2="100" stroke="#bf360c" stroke-width="0.5"/>

    <!-- Highlight: between two spacers is JUST channel (no S/D!) -->
    <rect x="155" y="63" width="40" height="110" fill="none" stroke="#1b5e20" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="160" y="55" font-size="9" fill="#1b5e20" font-weight="bold">兩 spacer 之間：</text>
    <text x="160" y="208" font-size="9" fill="#1b5e20" font-weight="bold">只有 channel + gate</text>

    <!-- S/D outside spacers indicator -->
    <line x1="105" y1="180" x2="80" y2="200" stroke="#0d47a1" stroke-width="0.8"/>
    <text x="78" y="213" font-size="9" fill="#0d47a1">S/D 在 spacer</text>
    <text x="78" y="225" font-size="9" fill="#0d47a1">外面</text>
    <line x1="245" y1="180" x2="280" y2="200" stroke="#0d47a1" stroke-width="0.8"/>
    <text x="265" y="213" font-size="9" fill="#0d47a1">同樣</text>
  </g>

  <!-- ============ VIEW 3: End view (across fin, Y-Z plane) ============ -->
  <g transform="translate(680, 60)">
    <rect x="0" y="0" width="300" height="220" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="150" y="20" text-anchor="middle" font-weight="bold" font-size="13">視角 3：沿 gate 方向切開 (Y-Z)</text>
    <text x="150" y="36" text-anchor="middle" font-size="10" fill="#555">穿過 channel 切，看 fin 與 gate wrap</text>

    <line x1="20" y1="195" x2="50" y2="195" stroke="#888" stroke-width="1" marker-end="url(#axis)"/>
    <text x="55" y="198" font-size="10" fill="#888">Y</text>
    <line x1="20" y1="195" x2="20" y2="170" stroke="#888" stroke-width="1" marker-end="url(#axis)"/>
    <text x="14" y="165" font-size="10" fill="#888">Z</text>

    <!-- Substrate -->
    <rect x="40" y="170" width="240" height="20" fill="#cfd8dc" stroke="#37474f"/>
    <text x="160" y="184" text-anchor="middle" font-size="9" fill="#263238">Si Substrate</text>

    <!-- Gate body wrapping around fins -->
    <rect x="60" y="80" width="200" height="90" fill="#7e57c2" fill-opacity="0.85" stroke="#311b92"/>
    <text x="160" y="100" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">GATE</text>
    <text x="160" y="115" text-anchor="middle" font-size="9" fill="#fff">(包覆 fin)</text>

    <!-- 3 fins inside gate -->
    <rect x="85" y="125" width="14" height="45" fill="#ffe082" stroke="#bf360c"/>
    <rect x="153" y="125" width="14" height="45" fill="#ffe082" stroke="#bf360c"/>
    <rect x="221" y="125" width="14" height="45" fill="#ffe082" stroke="#bf360c"/>

    <text x="92" y="183" text-anchor="middle" font-size="9" fill="#bf360c">fin</text>
    <text x="160" y="183" text-anchor="middle" font-size="9" fill="#bf360c">fin</text>
    <text x="228" y="183" text-anchor="middle" font-size="9" fill="#bf360c">fin</text>

    <!-- Note: no S/D visible -->
    <rect x="40" y="55" width="240" height="20" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
    <text x="160" y="69" text-anchor="middle" font-size="10" fill="#e65100">⚠ 此視角看不見 S/D：S/D 在圖面前後方</text>
  </g>

  <!-- ============ Bottom: combined explanation ============ -->
  <g transform="translate(20, 300)">
    <rect x="0" y="0" width="960" height="240" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1"/>
    <text x="10" y="22" font-size="13" font-weight="bold" fill="#4a148c">三個關鍵觀念</text>

    <text x="10" y="46" font-size="12" font-weight="bold" fill="#0d47a1">①  S、channel、D 沿 fin 長度方向（X）排列，是同一根 fin 的三段</text>
    <text x="20" y="62" font-size="11" fill="#444">原始的 fin 都是 Si。Ch 5 在 fin 中段放上 dummy gate + spacer，把中段保護住；Ch 6 把保護外的兩端挖掉、長 epi → 變 S/D。</text>
    <text x="20" y="78" font-size="11" fill="#444">→ S/D 與 channel **不是上下疊起來**，是**沿 fin 並排**。</text>

    <text x="10" y="106" font-size="12" font-weight="bold" fill="#0d47a1">②  Spacer 是 3D 立體牆，不是 2D 圖案</text>
    <text x="20" y="122" font-size="11" fill="#444">沿 X 方向：薄（5–10 nm）。沿 Y 方向：跟 gate stripe 同長（跨多顆 fin）。沿 Z 方向：跟 gate body 同高（50–100 nm）。</text>
    <text x="20" y="138" font-size="11" fill="#444">→ Spacer 把 **gate 區（中間）** 與 **S/D 區（外面）** 分開，不讓 gate 蓋到 S/D。</text>

    <text x="10" y="166" font-size="12" font-weight="bold" fill="#0d47a1">③  Gate 站在 channel 正上方，被 spacer 兩側夾住，不延伸到 S/D 上方</text>
    <text x="20" y="182" font-size="11" fill="#444">不是 T 字形（不會在 S/D 上方）。比較像「╪」字形：channel 在底下、gate 在正上方、spacer 兩側挾持。</text>
    <text x="20" y="198" font-size="11" fill="#444">在 FinFET / GAA 中，gate 不只在 channel 上方，還會包到 channel 兩側（FinFET）或四面（GAA），但仍被 spacer 邊界限制不蓋到 S/D。</text>

    <text x="10" y="226" font-size="11" fill="#4a148c" font-style="italic">→ 從工程角度看：spacer 是「定義 channel 邊界 + 確保 self-alignment」最關鍵的單一結構。它的厚度直接決定通道有效長度與 S/D extension overlap。</text>
  </g>

  <defs>
    <marker id="axis" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
  </defs>
</svg>
