<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="sans-serif" font-size="12">
  <title>Gate Recess + SAC Cap Formation：三步驟與功能</title>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="550" y="24" text-anchor="middle" font-weight="bold" font-size="16">Gate Recess + SAC Cap：從 Gate CMP 到 MOL 接手前的關鍵三步</text>
  <text x="550" y="42" text-anchor="middle" font-size="11" fill="#555">頂端 SiN cap + 側壁 SiN spacer 構成 MOL Self-Aligned Contact 的保護傘</text>

  <!-- Color legend -->
  <defs>
    <pattern id="hatchILD" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#90caf9" stroke-width="2"/>
    </pattern>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#37474f"/>
    </marker>
  </defs>

  <!-- ====================== Panel 1: Gate CMP 完成（起點） ====================== -->
  <g transform="translate(40, 70)">
    <rect x="0" y="0" width="320" height="220" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="160" y="20" text-anchor="middle" font-weight="bold" font-size="13" fill="#37474f">① Gate CMP 完成（起點）</text>

    <!-- substrate / fin -->
    <rect x="20" y="170" width="280" height="40" fill="#e0e0e0" stroke="#616161"/>
    <text x="160" y="195" text-anchor="middle" font-size="10" fill="#424242">Si substrate / fin / S/D</text>

    <!-- ILD0 left -->
    <rect x="20" y="80" width="90" height="90" fill="url(#hatchILD)" stroke="#1976d2"/>
    <text x="65" y="130" text-anchor="middle" font-size="10" fill="#0d47a1">ILD0</text>

    <!-- ILD0 right -->
    <rect x="210" y="80" width="90" height="90" fill="url(#hatchILD)" stroke="#1976d2"/>
    <text x="255" y="130" text-anchor="middle" font-size="10" fill="#0d47a1">ILD0</text>

    <!-- spacers -->
    <rect x="110" y="80" width="10" height="90" fill="#a5d6a7" stroke="#1b5e20"/>
    <rect x="200" y="80" width="10" height="90" fill="#a5d6a7" stroke="#1b5e20"/>

    <!-- Metal Gate filled, flush -->
    <rect x="120" y="80" width="80" height="90" fill="#ff8a65" stroke="#bf360c"/>
    <text x="160" y="130" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Metal</text>
    <text x="160" y="143" text-anchor="middle" font-size="9" fill="#fff">Gate</text>

    <!-- top flush line -->
    <line x1="20" y1="80" x2="300" y2="80" stroke="#37474f" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="160" y="72" text-anchor="middle" font-size="9" fill="#37474f">表面平整（Gate / ILD0 / spacer 齊高）</text>

    <!-- labels -->
    <text x="105" y="78" font-size="8" fill="#1b5e20">spacer</text>
  </g>

  <!-- ====================== Panel 2: Gate Recess ====================== -->
  <g transform="translate(390, 70)">
    <rect x="0" y="0" width="320" height="220" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="160" y="20" text-anchor="middle" font-weight="bold" font-size="13" fill="#37474f">② Gate Recess（金屬閘回蝕）</text>

    <!-- substrate -->
    <rect x="20" y="170" width="280" height="40" fill="#e0e0e0" stroke="#616161"/>
    <text x="160" y="195" text-anchor="middle" font-size="10" fill="#424242">Si substrate / fin / S/D</text>

    <!-- ILD0 (unchanged) -->
    <rect x="20" y="80" width="90" height="90" fill="url(#hatchILD)" stroke="#1976d2"/>
    <text x="65" y="130" text-anchor="middle" font-size="10" fill="#0d47a1">ILD0</text>
    <rect x="210" y="80" width="90" height="90" fill="url(#hatchILD)" stroke="#1976d2"/>
    <text x="255" y="130" text-anchor="middle" font-size="10" fill="#0d47a1">ILD0</text>

    <!-- spacers -->
    <rect x="110" y="80" width="10" height="90" fill="#a5d6a7" stroke="#1b5e20"/>
    <rect x="200" y="80" width="10" height="90" fill="#a5d6a7" stroke="#1b5e20"/>

    <!-- Metal Gate recessed (lower top) -->
    <rect x="120" y="115" width="80" height="55" fill="#ff8a65" stroke="#bf360c"/>
    <text x="160" y="150" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Metal Gate</text>

    <!-- The recess pocket (empty space) -->
    <rect x="120" y="80" width="80" height="35" fill="none" stroke="#d32f2f" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="160" y="100" text-anchor="middle" font-size="10" fill="#d32f2f" font-weight="bold">凹槽（已騰空）</text>

    <!-- Etch arrows -->
    <line x1="160" y1="55" x2="160" y2="78" stroke="#d32f2f" stroke-width="1.5" marker-end="url(#arrR)"/>
    <line x1="140" y1="55" x2="140" y2="78" stroke="#d32f2f" stroke-width="1" marker-end="url(#arrR)"/>
    <line x1="180" y1="55" x2="180" y2="78" stroke="#d32f2f" stroke-width="1" marker-end="url(#arrR)"/>
    <text x="160" y="50" text-anchor="middle" font-size="9" fill="#d32f2f">選擇性蝕刻：只吃金屬，不傷 ILD0 / spacer</text>
  </g>

  <!-- ====================== Panel 3: SAC Cap Dep + CMP ====================== -->
  <g transform="translate(740, 70)">
    <rect x="0" y="0" width="320" height="220" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="160" y="20" text-anchor="middle" font-weight="bold" font-size="13" fill="#37474f">③ SAC Cap Dep + Cap CMP</text>

    <!-- substrate -->
    <rect x="20" y="170" width="280" height="40" fill="#e0e0e0" stroke="#616161"/>
    <text x="160" y="195" text-anchor="middle" font-size="10" fill="#424242">Si substrate / fin / S/D</text>

    <!-- ILD0 -->
    <rect x="20" y="80" width="90" height="90" fill="url(#hatchILD)" stroke="#1976d2"/>
    <text x="65" y="130" text-anchor="middle" font-size="10" fill="#0d47a1">ILD0</text>
    <rect x="210" y="80" width="90" height="90" fill="url(#hatchILD)" stroke="#1976d2"/>
    <text x="255" y="130" text-anchor="middle" font-size="10" fill="#0d47a1">ILD0</text>

    <!-- spacers -->
    <rect x="110" y="80" width="10" height="90" fill="#a5d6a7" stroke="#1b5e20"/>
    <rect x="200" y="80" width="10" height="90" fill="#a5d6a7" stroke="#1b5e20"/>

    <!-- Metal Gate recessed -->
    <rect x="120" y="115" width="80" height="55" fill="#ff8a65" stroke="#bf360c"/>
    <text x="160" y="150" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Metal Gate</text>

    <!-- SAC Cap filled in pocket -->
    <rect x="120" y="80" width="80" height="35" fill="#aed581" stroke="#33691e" stroke-width="1.5"/>
    <text x="160" y="100" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="bold">SAC cap</text>
    <text x="160" y="111" text-anchor="middle" font-size="9" fill="#1b5e20">(SiN)</text>

    <!-- Flush surface -->
    <line x1="20" y1="80" x2="300" y2="80" stroke="#37474f" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="160" y="72" text-anchor="middle" font-size="9" fill="#37474f">CMP 後再次齊平</text>
  </g>

  <!-- Big arrows between panels -->
  <line x1="362" y1="180" x2="388" y2="180" stroke="#37474f" stroke-width="2" marker-end="url(#arrR)"/>
  <line x1="712" y1="180" x2="738" y2="180" stroke="#37474f" stroke-width="2" marker-end="url(#arrR)"/>

  <!-- ====================== Bottom: Why this matters (SAC philosophy) ====================== -->
  <g transform="translate(40, 320)">
    <rect x="0" y="0" width="1020" height="220" fill="#fffde7" stroke="#fbc02d"/>
    <text x="510" y="22" text-anchor="middle" font-weight="bold" font-size="14" fill="#5d4037">為什麼要做這個 cap：MOL 階段 MD etch 的「保護傘」</text>
    <text x="510" y="38" text-anchor="middle" font-size="10" fill="#5d4037">MD 設計上落在 S/D 正上方；mask 偏移使開口邊緣跨入 gate 區 → 比較有 / 沒有 cap 的下場</text>

    <!-- Left mini scene: NO SAC cap -->
    <g transform="translate(20, 50)">
      <text x="160" y="0" text-anchor="middle" font-weight="bold" font-size="12" fill="#c62828">沒有 SAC cap：MD 開口邊緣跨入 gate → 短路</text>
      <rect x="20" y="20" width="290" height="150" fill="#fafafa" stroke="#bdbdbd"/>

      <!-- ILD1 (MOL adds this above FEOL surface) -->
      <rect x="30" y="40" width="270" height="35" fill="#bbdefb" stroke="#1976d2" stroke-width="0.5"/>
      <text x="42" y="61" font-size="9" fill="#0d47a1">ILD1</text>

      <!-- FEOL surface line -->
      <line x1="30" y1="75" x2="300" y2="75" stroke="#37474f" stroke-width="0.4"/>

      <!-- ILD0 left (over left S/D area) -->
      <rect x="30" y="75" width="80" height="50" fill="url(#hatchILD)" stroke="#1976d2"/>
      <text x="70" y="103" text-anchor="middle" font-size="9" fill="#0d47a1">ILD0</text>

      <!-- Spacer left -->
      <rect x="110" y="75" width="8" height="50" fill="#a5d6a7" stroke="#1b5e20"/>

      <!-- Metal Gate (no recess, no cap, full height) -->
      <rect x="118" y="75" width="50" height="50" fill="#ff8a65" stroke="#bf360c"/>
      <text x="143" y="105" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">MG</text>

      <!-- Spacer right -->
      <rect x="168" y="75" width="8" height="50" fill="#a5d6a7" stroke="#1b5e20"/>

      <!-- ILD0 right (over right S/D area, MD intended to land here) -->
      <rect x="176" y="75" width="124" height="50" fill="url(#hatchILD)" stroke="#1976d2"/>
      <text x="240" y="103" text-anchor="middle" font-size="9" fill="#0d47a1">ILD0 (over right S/D)</text>

      <!-- Substrate / Si / S/D -->
      <rect x="30" y="125" width="270" height="20" fill="#e0e0e0" stroke="#616161"/>
      <text x="60" y="139" font-size="9" fill="#424242">Si / S/D</text>

      <!-- Intended MD position (faint outline, over right S/D, centered) -->
      <rect x="200" y="40" width="60" height="35" fill="none" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="2,2"/>
      <text x="230" y="36" text-anchor="middle" font-size="8" fill="#9e9e9e">MD 設計位置</text>

      <!-- Actual MD opening (shifted leftward, overlaps gate edge by ~15 nm) -->
      <!-- Top portion through ILD1 -->
      <rect x="160" y="40" width="60" height="35" fill="#fff8e1" stroke="#f57f17" stroke-width="1.5" stroke-dasharray="4,2"/>
      <!-- Lower portion: where ILD0 was etched away (only over right S/D area) -->
      <rect x="176" y="75" width="44" height="50" fill="#fff8e1" stroke="#f57f17" stroke-width="1.5" stroke-dasharray="4,2"/>

      <!-- Shift arrow -->
      <line x1="200" y1="48" x2="180" y2="48" stroke="#c62828" stroke-width="1" marker-end="url(#arrR)"/>
      <text x="190" y="44" text-anchor="middle" font-size="8" fill="#c62828">mask 偏</text>

      <!-- Exposed MG top (the danger zone) -->
      <line x1="160" y1="75" x2="168" y2="75" stroke="#c62828" stroke-width="3.5"/>
      <text x="143" y="68" font-size="14" fill="#c62828" font-weight="bold">⚡</text>
      <text x="143" y="58" text-anchor="middle" font-size="8" fill="#c62828">MG 頂被打開</text>

      <text x="30" y="163" font-size="10" fill="#c62828" font-weight="bold">→ MD 金屬填入後 MG 與 MD 直接相連 → MDMG short</text>
    </g>

    <!-- Right mini scene: WITH SAC cap -->
    <g transform="translate(360, 50)">
      <text x="160" y="0" text-anchor="middle" font-weight="bold" font-size="12" fill="#1b5e20">有 SAC cap：同樣偏移 → cap + spacer 擋住 gate</text>
      <rect x="20" y="20" width="290" height="150" fill="#fafafa" stroke="#bdbdbd"/>

      <!-- ILD1 -->
      <rect x="30" y="40" width="270" height="35" fill="#bbdefb" stroke="#1976d2" stroke-width="0.5"/>
      <text x="42" y="61" font-size="9" fill="#0d47a1">ILD1</text>

      <line x1="30" y1="75" x2="300" y2="75" stroke="#37474f" stroke-width="0.4"/>

      <!-- ILD0 left -->
      <rect x="30" y="75" width="80" height="50" fill="url(#hatchILD)" stroke="#1976d2"/>
      <text x="70" y="103" text-anchor="middle" font-size="9" fill="#0d47a1">ILD0</text>

      <!-- Spacer left -->
      <rect x="110" y="75" width="8" height="50" fill="#a5d6a7" stroke="#1b5e20"/>

      <!-- Metal Gate (recessed) -->
      <rect x="118" y="95" width="50" height="30" fill="#ff8a65" stroke="#bf360c"/>
      <text x="143" y="114" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">MG</text>

      <!-- SAC cap on top of MG -->
      <rect x="118" y="75" width="50" height="20" fill="#aed581" stroke="#33691e" stroke-width="1.5"/>
      <text x="143" y="89" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">SAC cap</text>

      <!-- Spacer right -->
      <rect x="168" y="75" width="8" height="50" fill="#a5d6a7" stroke="#1b5e20"/>

      <!-- ILD0 right -->
      <rect x="176" y="75" width="124" height="50" fill="url(#hatchILD)" stroke="#1976d2"/>
      <text x="240" y="103" text-anchor="middle" font-size="9" fill="#0d47a1">ILD0 (over right S/D)</text>

      <!-- Substrate -->
      <rect x="30" y="125" width="270" height="20" fill="#e0e0e0" stroke="#616161"/>
      <text x="60" y="139" font-size="9" fill="#424242">Si / S/D</text>

      <!-- Intended MD position -->
      <rect x="200" y="40" width="60" height="35" fill="none" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="2,2"/>
      <text x="230" y="36" text-anchor="middle" font-size="8" fill="#9e9e9e">MD 設計位置</text>

      <!-- Actual MD opening (same shift) -->
      <rect x="160" y="40" width="60" height="35" fill="#fff8e1" stroke="#1b5e20" stroke-width="1.5" stroke-dasharray="4,2"/>
      <!-- Lower portion: only over right S/D landed -->
      <rect x="176" y="75" width="44" height="50" fill="#fff8e1" stroke="#1b5e20" stroke-width="1.5" stroke-dasharray="4,2"/>

      <!-- Shift arrow -->
      <line x1="200" y1="48" x2="180" y2="48" stroke="#1b5e20" stroke-width="1" marker-end="url(#arrR)"/>
      <text x="190" y="44" text-anchor="middle" font-size="8" fill="#1b5e20">mask 偏</text>

      <!-- Cap stops the etch at gate-overlap region -->
      <line x1="160" y1="75" x2="168" y2="75" stroke="#1b5e20" stroke-width="3"/>
      <text x="143" y="68" font-size="14" fill="#1b5e20" font-weight="bold">✓</text>
      <text x="143" y="58" text-anchor="middle" font-size="8" fill="#1b5e20">etch 停在 cap</text>

      <text x="30" y="163" font-size="10" fill="#1b5e20" font-weight="bold">→ MD 只接到右 S/D，MG 被 cap 保護 → 安全</text>
    </g>

    <!-- Key text on right -->
    <g transform="translate(720, 60)">
      <text x="0" y="0" font-weight="bold" font-size="12" fill="#5d4037">機制核心：</text>
      <text x="0" y="20" font-size="10" fill="#444">▶ MD etch 化學對 SiO2 蝕刻快</text>
      <text x="0" y="35" font-size="10" fill="#444">▶ 對 SiN（cap、spacer）蝕刻慢</text>
      <text x="0" y="50" font-size="10" fill="#444">▶ 高 selectivity → 自動停在 SiN</text>
      <text x="0" y="75" font-weight="bold" font-size="12" fill="#5d4037">關鍵變因：</text>
      <text x="0" y="95" font-size="10" fill="#444">▶ Cap 厚度（太薄會被穿）</text>
      <text x="0" y="110" font-size="10" fill="#444">▶ Cap 緻密度（疏鬆則 selectivity 差）</text>
      <text x="0" y="125" font-size="10" fill="#444">▶ Recess 深度（過深 → MG 變矮）</text>
      <text x="0" y="140" font-size="10" fill="#444">▶ Cap CMP dishing（中央偏薄）</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="550" y="555" text-anchor="middle" font-size="10" fill="#666">SAC etch 完整流程留待 Vol 2 MOL Ch 0.6；本圖聚焦 FEOL 端 cap 形成</text>
</svg>
