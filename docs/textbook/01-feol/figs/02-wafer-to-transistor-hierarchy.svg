<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" font-family="sans-serif" font-size="12">
  <title>Wafer → Die → Cell → OD → Transistor 階層</title>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <!-- Master title -->
  <text x="500" y="22" text-anchor="middle" font-weight="bold" font-size="15">尺度階層：Wafer 到 Transistor 的 5 層放大</text>
  <text x="500" y="40" text-anchor="middle" font-size="11" fill="#555">每一層用什麼把單元分隔開</text>

  <!-- ============ Level 1: Wafer ============ -->
  <g transform="translate(20, 60)">
    <rect x="0" y="0" width="180" height="200" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="90" y="20" text-anchor="middle" font-weight="bold" font-size="13">① Wafer</text>
    <text x="90" y="36" text-anchor="middle" font-size="10" fill="#555">~300 mm 直徑</text>

    <!-- Wafer circle with grid of dies -->
    <circle cx="90" cy="115" r="60" fill="#e3f2fd" stroke="#0d47a1" stroke-width="1.5"/>

    <!-- Die grid (clipped to circle) -->
    <g clip-path="url(#waferClip)">
      <g stroke="#0d47a1" stroke-width="0.6" fill="none">
        <line x1="40" y1="65" x2="40" y2="165"/>
        <line x1="55" y1="65" x2="55" y2="165"/>
        <line x1="70" y1="65" x2="70" y2="165"/>
        <line x1="85" y1="65" x2="85" y2="165"/>
        <line x1="100" y1="65" x2="100" y2="165"/>
        <line x1="115" y1="65" x2="115" y2="165"/>
        <line x1="130" y1="65" x2="130" y2="165"/>
        <line x1="145" y1="65" x2="145" y2="165"/>
        <line x1="30" y1="75" x2="155" y2="75"/>
        <line x1="30" y1="90" x2="155" y2="90"/>
        <line x1="30" y1="105" x2="155" y2="105"/>
        <line x1="30" y1="120" x2="155" y2="120"/>
        <line x1="30" y1="135" x2="155" y2="135"/>
        <line x1="30" y1="150" x2="155" y2="150"/>
      </g>
    </g>
    <clipPath id="waferClip">
      <circle cx="90" cy="115" r="58"/>
    </clipPath>

    <!-- Highlight one die -->
    <rect x="85" y="90" width="15" height="15" fill="none" stroke="#d32f2f" stroke-width="1.5"/>

    <text x="90" y="195" text-anchor="middle" font-size="9" fill="#444">內含百到千顆 die</text>
  </g>

  <!-- Arrow from L1 to L2 -->
  <line x1="208" y1="155" x2="232" y2="155" stroke="#444" stroke-width="2" marker-end="url(#arrH)"/>
  <text x="220" y="148" text-anchor="middle" font-size="10" fill="#444">放大</text>

  <!-- ============ Level 2: Die ============ -->
  <g transform="translate(240, 60)">
    <rect x="0" y="0" width="180" height="200" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="90" y="20" text-anchor="middle" font-weight="bold" font-size="13">② Die（晶粒）</text>
    <text x="90" y="36" text-anchor="middle" font-size="10" fill="#555">~10 mm × 10 mm</text>

    <!-- Die outline -->
    <rect x="15" y="50" width="150" height="130" fill="#e8f5e9" stroke="#1b5e20" stroke-width="1.5"/>

    <!-- Functional blocks -->
    <rect x="25" y="60" width="60" height="50" fill="#a5d6a7" stroke="#1b5e20"/>
    <text x="55" y="88" text-anchor="middle" font-size="10" fill="#1b5e20">CPU</text>

    <rect x="95" y="60" width="60" height="50" fill="#a5d6a7" stroke="#1b5e20"/>
    <text x="125" y="88" text-anchor="middle" font-size="10" fill="#1b5e20">GPU</text>

    <rect x="25" y="120" width="60" height="50" fill="#a5d6a7" stroke="#1b5e20"/>
    <text x="55" y="148" text-anchor="middle" font-size="10" fill="#1b5e20">Cache</text>

    <rect x="95" y="120" width="60" height="50" fill="#a5d6a7" stroke="#1b5e20"/>
    <text x="125" y="148" text-anchor="middle" font-size="10" fill="#1b5e20">I/O</text>

    <!-- Highlight one tiny part of cache -->
    <rect x="32" y="135" width="6" height="6" fill="none" stroke="#d32f2f" stroke-width="1.5"/>

    <text x="90" y="195" text-anchor="middle" font-size="9" fill="#444">含多個 functional block</text>
  </g>

  <!-- Arrow -->
  <line x1="428" y1="155" x2="452" y2="155" stroke="#444" stroke-width="2" marker-end="url(#arrH)"/>

  <!-- ============ Level 3: Standard Cell ============ -->
  <g transform="translate(460, 60)">
    <rect x="0" y="0" width="180" height="200" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="90" y="20" text-anchor="middle" font-weight="bold" font-size="13">③ Standard Cells</text>
    <text x="90" y="36" text-anchor="middle" font-size="10" fill="#555">~0.2 µm × 0.05 µm 一顆</text>

    <!-- Row of cells -->
    <g transform="translate(15, 60)">
      <rect x="0" y="0" width="40" height="60" fill="#fff3e0" stroke="#e65100"/>
      <text x="20" y="32" text-anchor="middle" font-size="9" fill="#bf360c">INV</text>

      <rect x="40" y="0" width="50" height="60" fill="#fff3e0" stroke="#e65100"/>
      <text x="65" y="32" text-anchor="middle" font-size="9" fill="#bf360c">NAND2</text>

      <rect x="90" y="0" width="40" height="60" fill="#fff3e0" stroke="#e65100"/>
      <text x="110" y="32" text-anchor="middle" font-size="9" fill="#bf360c">INV</text>

      <rect x="130" y="0" width="35" height="60" fill="#fff3e0" stroke="#e65100"/>
      <text x="148" y="32" text-anchor="middle" font-size="9" fill="#bf360c">FF</text>
    </g>

    <!-- Second row -->
    <g transform="translate(15, 130)">
      <rect x="0" y="0" width="60" height="50" fill="#fff3e0" stroke="#e65100"/>
      <text x="30" y="28" text-anchor="middle" font-size="9" fill="#bf360c">NOR3</text>

      <rect x="60" y="0" width="50" height="50" fill="#fff3e0" stroke="#e65100"/>
      <text x="85" y="28" text-anchor="middle" font-size="9" fill="#bf360c">XOR</text>

      <rect x="110" y="0" width="55" height="50" fill="#fff3e0" stroke="#e65100"/>
      <text x="138" y="28" text-anchor="middle" font-size="9" fill="#bf360c">AOI22</text>
    </g>

    <!-- Highlight one cell -->
    <rect x="55" y="60" width="50" height="60" fill="none" stroke="#d32f2f" stroke-width="1.5"/>

    <text x="90" y="195" text-anchor="middle" font-size="9" fill="#444">每 cell 含 2–10 顆電晶體</text>
  </g>

  <!-- Arrow -->
  <line x1="648" y1="155" x2="672" y2="155" stroke="#444" stroke-width="2" marker-end="url(#arrH)"/>

  <!-- ============ Level 4: Inside one cell — ODs ============ -->
  <g transform="translate(680, 60)">
    <rect x="0" y="0" width="300" height="200" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="150" y="20" text-anchor="middle" font-weight="bold" font-size="13">④ Cell 內：OD（Active Regions）</text>
    <text x="150" y="36" text-anchor="middle" font-size="10" fill="#555">PMOS row + NMOS row 用 STI 隔開</text>

    <!-- PMOS OD (top) -->
    <rect x="20" y="55" width="260" height="35" fill="#e1bee7" stroke="#4a148c"/>
    <text x="150" y="73" text-anchor="middle" font-size="11" fill="#4a148c" font-weight="bold">PMOS OD (P-row)</text>
    <text x="150" y="86" text-anchor="middle" font-size="9" fill="#4a148c">N-well 上、用 PEPI</text>

    <!-- STI between rows -->
    <rect x="20" y="90" width="260" height="20" fill="#cfd8dc" stroke="#37474f"/>
    <text x="150" y="103" text-anchor="middle" font-size="11" fill="#d32f2f" font-weight="bold">⬅ STI 把兩 row 隔開 ⬅</text>

    <!-- NMOS OD (bottom) -->
    <rect x="20" y="110" width="260" height="35" fill="#bbdefb" stroke="#0d47a1"/>
    <text x="150" y="128" text-anchor="middle" font-size="11" fill="#0d47a1" font-weight="bold">NMOS OD (N-row)</text>
    <text x="150" y="141" text-anchor="middle" font-size="9" fill="#0d47a1">P-well 上、用 NEPI</text>

    <!-- STI on top and bottom of cell -->
    <rect x="20" y="45" width="260" height="10" fill="#cfd8dc" stroke="#37474f"/>
    <rect x="20" y="145" width="260" height="10" fill="#cfd8dc" stroke="#37474f"/>

    <!-- Highlight one OD -->
    <rect x="18" y="53" width="264" height="39" fill="none" stroke="#d32f2f" stroke-width="1.5"/>

    <text x="150" y="180" text-anchor="middle" font-size="10" fill="#444">每個 OD 內含多 fin × 多 gate stripe</text>
  </g>

  <!-- ============ Level 5: Active region zoom ============ -->
  <g transform="translate(360, 290)">
    <rect x="0" y="0" width="380" height="170" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="190" y="20" text-anchor="middle" font-weight="bold" font-size="13">⑤ OD 內：多 fin、多 gate</text>
    <text x="190" y="36" text-anchor="middle" font-size="10" fill="#555">同一 OD 內所有電晶體都同型（全 P 或全 N）</text>

    <!-- Active region outer -->
    <rect x="20" y="50" width="340" height="100" fill="#bbdefb" stroke="#0d47a1" stroke-width="1.5"/>

    <!-- Fins horizontal -->
    <line x1="30" y1="70" x2="350" y2="70" stroke="#bf360c" stroke-width="3"/>
    <line x1="30" y1="85" x2="350" y2="85" stroke="#bf360c" stroke-width="3"/>
    <line x1="30" y1="100" x2="350" y2="100" stroke="#bf360c" stroke-width="3"/>
    <line x1="30" y1="115" x2="350" y2="115" stroke="#bf360c" stroke-width="3"/>
    <line x1="30" y1="130" x2="350" y2="130" stroke="#bf360c" stroke-width="3"/>

    <text x="20" y="76" text-anchor="end" font-size="8" fill="#bf360c">fin</text>

    <!-- Gate stripes vertical -->
    <rect x="60" y="55" width="12" height="90" fill="#7e57c2" fill-opacity="0.85" stroke="#311b92"/>
    <rect x="120" y="55" width="12" height="90" fill="#7e57c2" fill-opacity="0.85" stroke="#311b92"/>
    <rect x="180" y="55" width="12" height="90" fill="#7e57c2" fill-opacity="0.85" stroke="#311b92"/>
    <rect x="240" y="55" width="12" height="90" fill="#7e57c2" fill-opacity="0.85" stroke="#311b92"/>
    <rect x="300" y="55" width="12" height="90" fill="#7e57c2" fill-opacity="0.85" stroke="#311b92"/>

    <text x="66" y="50" text-anchor="middle" font-size="8" fill="#311b92">G</text>
    <text x="126" y="50" text-anchor="middle" font-size="8" fill="#311b92">G</text>
    <text x="186" y="50" text-anchor="middle" font-size="8" fill="#311b92">G</text>
    <text x="246" y="50" text-anchor="middle" font-size="8" fill="#311b92">G</text>
    <text x="306" y="50" text-anchor="middle" font-size="8" fill="#311b92">G</text>

    <text x="190" y="165" text-anchor="middle" font-size="10" fill="#444">5 fin × 5 gate = 25 顆電晶體（全部同型）</text>
  </g>

  <!-- ============ Bottom: separator hierarchy table ============ -->
  <g transform="translate(20, 290)">
    <rect x="0" y="0" width="320" height="170" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1"/>
    <text x="10" y="22" font-size="13" font-weight="bold" fill="#4a148c">每一層的「分隔機制」</text>

    <text x="10" y="46" font-size="11" fill="#444"><tspan font-weight="bold">Wafer ↔ Die：</tspan></text>
    <text x="20" y="62" font-size="10" fill="#666">scribe line（切割道，製程後機械切開）</text>

    <text x="10" y="84" font-size="11" fill="#444"><tspan font-weight="bold">Die 內 block / cell：</tspan></text>
    <text x="20" y="100" font-size="10" fill="#666">無物理分隔，靠 layout 規則與 SDB / DDB</text>

    <text x="10" y="122" font-size="11" fill="#d32f2f"><tspan font-weight="bold">Cell 內 P row / N row：⭐ STI ⭐</tspan></text>
    <text x="20" y="138" font-size="10" fill="#666">FEOL Ch 2 的 STI 在這層</text>

    <text x="10" y="160" font-size="11" fill="#444"><tspan font-weight="bold">同 row 內多顆電晶體：</tspan>無需分隔，共用 active</text>
  </g>

  <!-- Right: scale comparison -->
  <g transform="translate(760, 290)">
    <rect x="0" y="0" width="220" height="170" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
    <text x="10" y="22" font-size="13" font-weight="bold" fill="#bf360c">尺度對比</text>

    <text x="10" y="46" font-size="11" fill="#444">Wafer：300 <tspan font-weight="bold">mm</tspan></text>
    <text x="10" y="66" font-size="11" fill="#444">Die：~10 <tspan font-weight="bold">mm</tspan></text>
    <text x="10" y="86" font-size="11" fill="#444">Cell：~0.2 <tspan font-weight="bold">µm</tspan></text>
    <text x="10" y="106" font-size="11" fill="#444">Active region：~50 <tspan font-weight="bold">nm</tspan></text>
    <text x="10" y="126" font-size="11" fill="#d32f2f" font-weight="bold">STI 寬度：~30–100 nm</text>
    <text x="10" y="146" font-size="11" fill="#444">Fin / Gate：~5–10 nm</text>

    <text x="10" y="166" font-size="9" fill="#666" font-style="italic">STI 比 die 邊界小 10⁵ 倍</text>
  </g>

  <defs>
    <marker id="arrH" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
  </defs>
</svg>
