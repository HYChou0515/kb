<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="sans-serif" font-size="12">
  <title>SAC etch mechanism — 理想對位 vs. mask 偏移</title>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <!-- Title -->
  <text x="380" y="22" text-anchor="middle" font-weight="bold" font-size="14">Self-Aligned Contact (SAC)：靠結構自動避讓 Gate</text>

  <!-- ===== Panel 1: Ideal alignment ===== -->
  <g transform="translate(20, 50)">
    <text x="170" y="0" text-anchor="middle" font-weight="bold" font-size="13" fill="#1b5e20">理想對位（Mask 對準）</text>

    <!-- Photoresist mask opening -->
    <rect x="0" y="20" width="120" height="20" fill="#ffcc80" stroke="#e65100"/>
    <rect x="220" y="20" width="120" height="20" fill="#ffcc80" stroke="#e65100"/>
    <text x="170" y="34" text-anchor="middle" font-size="11" fill="#e65100">Photoresist</text>
    <text x="170" y="14" text-anchor="middle" font-size="10" fill="#e65100">▼ MD 開口（mask 對準中心） ▼</text>

    <!-- Etch arrow -->
    <line x1="170" y1="42" x2="170" y2="60" stroke="#d32f2f" stroke-width="2" marker-end="url(#arrowD)"/>

    <!-- Cross-section of structure -->
    <!-- ILD on both sides -->
    <rect x="0" y="60" width="100" height="180" fill="#bbdefb" stroke="#0d47a1"/>
    <text x="50" y="155" text-anchor="middle" font-size="11" fill="#0d47a1">ILD0/1</text>
    <text x="50" y="170" text-anchor="middle" font-size="10" fill="#0d47a1">(SiO₂)</text>

    <rect x="240" y="60" width="100" height="180" fill="#bbdefb" stroke="#0d47a1"/>
    <text x="290" y="155" text-anchor="middle" font-size="11" fill="#0d47a1">ILD0/1</text>
    <text x="290" y="170" text-anchor="middle" font-size="10" fill="#0d47a1">(SiO₂)</text>

    <!-- Spacers -->
    <rect x="100" y="60" width="14" height="180" fill="#ffe0b2" stroke="#bf360c"/>
    <rect x="226" y="60" width="14" height="180" fill="#ffe0b2" stroke="#bf360c"/>

    <!-- SAC cap -->
    <rect x="114" y="60" width="112" height="40" fill="#ffe0b2" stroke="#bf360c" stroke-width="1.5"/>
    <text x="170" y="84" text-anchor="middle" font-size="11" fill="#bf360c" font-weight="bold">SAC cap (SiN)</text>

    <!-- Metal Gate -->
    <rect x="114" y="100" width="112" height="120" fill="#9e9e9e" stroke="#212121"/>
    <text x="170" y="160" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Metal Gate</text>
    <text x="170" y="175" text-anchor="middle" font-size="10" fill="#fff">(W/Co + WFM + HK)</text>

    <!-- S/D epi -->
    <rect x="0" y="240" width="340" height="20" fill="#cfd8dc" stroke="#37474f"/>
    <polygon points="40,220 80,240 40,260 0,240" fill="#b39ddb" stroke="#311b92" stroke-width="0.5"/>
    <polygon points="300,220 340,240 300,260 260,240" fill="#b39ddb" stroke="#311b92" stroke-width="0.5"/>
    <text x="40" y="244" text-anchor="middle" font-size="9" fill="#fff">S/D</text>
    <text x="300" y="244" text-anchor="middle" font-size="9" fill="#fff">S/D</text>

    <!-- Etched contact (good landing on S/D) -->
    <line x1="0" y1="60" x2="0" y2="220" stroke="#d32f2f" stroke-width="0" stroke-dasharray="3,3"/>

    <!-- Etch arrows down both sides -->
    <line x1="50" y1="48" x2="50" y2="220" stroke="#d32f2f" stroke-width="0.8" stroke-dasharray="3,3"/>
    <line x1="290" y1="48" x2="290" y2="220" stroke="#d32f2f" stroke-width="0.8" stroke-dasharray="3,3"/>
    <text x="50" y="234" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">✓ 落在 S/D</text>
    <text x="290" y="234" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">✓ 落在 S/D</text>
  </g>

  <!-- ===== Panel 2: Misaligned ===== -->
  <g transform="translate(420, 50)">
    <text x="170" y="0" text-anchor="middle" font-weight="bold" font-size="13" fill="#bf360c">Mask 偏右一點（Overlay 飄）</text>

    <!-- Photoresist mask shifted right -->
    <rect x="0" y="20" width="135" height="20" fill="#ffcc80" stroke="#e65100"/>
    <rect x="235" y="20" width="105" height="20" fill="#ffcc80" stroke="#e65100"/>
    <text x="170" y="14" text-anchor="middle" font-size="10" fill="#e65100">▼ MD 開口（向右偏） ▼</text>

    <!-- Etch arrow -->
    <line x1="185" y1="42" x2="185" y2="60" stroke="#d32f2f" stroke-width="2" marker-end="url(#arrowD)"/>

    <!-- Cross-section of structure -->
    <rect x="0" y="60" width="100" height="180" fill="#bbdefb" stroke="#0d47a1"/>
    <rect x="240" y="60" width="100" height="180" fill="#bbdefb" stroke="#0d47a1"/>
    <text x="50" y="155" text-anchor="middle" font-size="11" fill="#0d47a1">ILD0/1</text>
    <text x="290" y="155" text-anchor="middle" font-size="11" fill="#0d47a1">ILD0/1</text>

    <!-- Spacers -->
    <rect x="100" y="60" width="14" height="180" fill="#ffe0b2" stroke="#bf360c"/>
    <rect x="226" y="60" width="14" height="180" fill="#ffe0b2" stroke="#bf360c"/>

    <!-- SAC cap (with right portion exposed to etch) -->
    <rect x="114" y="60" width="112" height="40" fill="#ffe0b2" stroke="#bf360c" stroke-width="1.5"/>
    <text x="170" y="84" text-anchor="middle" font-size="11" fill="#bf360c" font-weight="bold">SAC cap (SiN)</text>

    <!-- Metal Gate -->
    <rect x="114" y="100" width="112" height="120" fill="#9e9e9e" stroke="#212121"/>
    <text x="170" y="160" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Metal Gate</text>

    <!-- S/D epi -->
    <rect x="0" y="240" width="340" height="20" fill="#cfd8dc" stroke="#37474f"/>
    <polygon points="40,220 80,240 40,260 0,240" fill="#b39ddb" stroke="#311b92" stroke-width="0.5"/>
    <polygon points="300,220 340,240 300,260 260,240" fill="#b39ddb" stroke="#311b92" stroke-width="0.5"/>

    <!-- Highlight: etch shifted right hits SAC cap area -->
    <rect x="135" y="60" width="91" height="40" fill="none" stroke="#d32f2f" stroke-width="2.5" stroke-dasharray="3,2"/>
    <text x="180" y="56" text-anchor="middle" font-size="9" fill="#d32f2f" font-weight="bold">蝕刻打到 cap → SiN selectivity 接管</text>

    <!-- Cap holds because of selectivity -->
    <text x="170" y="115" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="bold">✓ Cap 擋住 → Gate 安全</text>

    <!-- Successful S/D landing on left, narrowed on right -->
    <line x1="65" y1="48" x2="65" y2="220" stroke="#d32f2f" stroke-width="0.8" stroke-dasharray="3,3"/>
    <line x1="285" y1="48" x2="285" y2="220" stroke="#d32f2f" stroke-width="0.8" stroke-dasharray="3,3"/>
    <text x="65" y="234" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">✓ 落在 S/D</text>
    <text x="285" y="234" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">✓ 落在 S/D</text>
  </g>

  <!-- Bottom note: the failure mode -->
  <g transform="translate(20, 350)">
    <rect x="0" y="0" width="720" height="55" fill="#ffebee" stroke="#c62828" stroke-width="1"/>
    <text x="10" y="18" font-size="12" font-weight="bold" fill="#c62828">SAC 失效（MDMG short）的條件：</text>
    <text x="10" y="34" font-size="11" fill="#c62828">當 cap 太薄、CMP 過磨、或 etch 對 SiN selectivity 不夠 → cap 被打穿 → contact 落到 metal gate → MD 與 Gate 短路</text>
    <text x="10" y="50" font-size="11" fill="#c62828">每片 wafer 上的 SAC margin ≈ cap 厚度 + spacer 厚度 - photo overlay 飄移 - etch 過蝕量</text>
  </g>

  <defs>
    <marker id="arrowD" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d32f2f"/>
    </marker>
  </defs>
</svg>
