<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 580" font-family="sans-serif" font-size="12">
  <title>Silicide：為什麼需要 + Ti-based silicide-as-liner 整合三階段</title>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <defs>
    <pattern id="hSiO2s" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#90caf9" stroke-width="2"/>
    </pattern>
  </defs>

  <text x="550" y="24" text-anchor="middle" font-weight="bold" font-size="16">Silicide：為什麼需要 + Ti-based silicide-as-liner 三階段整合</text>

  <!-- ====== Top: WHY silicide (barrier comparison) ====== -->
  <text x="550" y="58" text-anchor="middle" font-weight="bold" font-size="13" fill="#37474f">① 為什麼需要 silicide：把單一高 Schottky barrier 拆成兩個低 barrier</text>

  <!-- Without silicide -->
  <g transform="translate(70, 80)">
    <rect x="0" y="0" width="430" height="170" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="215" y="20" text-anchor="middle" font-weight="bold" font-size="12" fill="#c62828">沒有 silicide：直接金屬-Si 介面</text>

    <!-- Stack -->
    <rect x="40" y="40" width="160" height="40" fill="#9e9e9e" stroke="#212121"/>
    <text x="120" y="65" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Metal（W / Co）</text>

    <rect x="40" y="80" width="160" height="10" fill="#e57373" stroke="#b71c1c"/>
    <text x="120" y="89" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">Schottky barrier（高）</text>

    <rect x="40" y="90" width="160" height="50" fill="#e0e0e0" stroke="#616161"/>
    <text x="120" y="118" text-anchor="middle" font-size="11" fill="#37474f">Si（S/D, 重摻雜）</text>

    <!-- Barrier height visualization (right side bar chart) -->
    <text x="290" y="40" font-size="11" font-weight="bold" fill="#37474f">電子要跨的 barrier：</text>
    <rect x="290" y="55" width="40" height="70" fill="#c62828"/>
    <text x="310" y="100" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">高</text>
    <text x="340" y="80" font-size="10" fill="#c62828">Rc ~ 10⁻⁵ Ω·cm²</text>
    <text x="340" y="95" font-size="9" fill="#666">→ 電流卡在介面</text>

    <text x="215" y="160" text-anchor="middle" font-size="10" fill="#c62828">→ 元件做再好，訊號都被介面拖累</text>
  </g>

  <!-- With silicide -->
  <g transform="translate(580, 80)">
    <rect x="0" y="0" width="430" height="170" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="215" y="20" text-anchor="middle" font-weight="bold" font-size="12" fill="#1b5e20">有 silicide：插入中介層</text>

    <!-- Stack -->
    <rect x="40" y="40" width="160" height="30" fill="#9e9e9e" stroke="#212121"/>
    <text x="120" y="60" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Metal（W / Co）</text>

    <rect x="40" y="70" width="160" height="6" fill="#a5d6a7" stroke="#1b5e20"/>
    <text x="120" y="75" text-anchor="middle" font-size="8" fill="#1b5e20">低 barrier（金屬-silicide）</text>

    <rect x="40" y="76" width="160" height="22" fill="#ffb74d" stroke="#e65100"/>
    <text x="120" y="91" text-anchor="middle" font-size="11" fill="#5d4037" font-weight="bold">Silicide（TiSi / CoSi / NiSi）</text>

    <rect x="40" y="98" width="160" height="6" fill="#a5d6a7" stroke="#1b5e20"/>
    <text x="120" y="103" text-anchor="middle" font-size="8" fill="#1b5e20">低 barrier（silicide-Si）</text>

    <rect x="40" y="104" width="160" height="36" fill="#e0e0e0" stroke="#616161"/>
    <text x="120" y="125" text-anchor="middle" font-size="11" fill="#37474f">Si（S/D, 重摻雜）</text>

    <!-- Barrier height visualization: two short bars -->
    <text x="290" y="40" font-size="11" font-weight="bold" fill="#37474f">電子要跨的 barrier：</text>
    <rect x="290" y="80" width="18" height="25" fill="#1b5e20"/>
    <rect x="312" y="80" width="18" height="25" fill="#1b5e20"/>
    <text x="299" y="98" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">低</text>
    <text x="321" y="98" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">低</text>
    <text x="340" y="90" font-size="10" fill="#1b5e20">Rc ↓ 至 ~10⁻⁹ Ω·cm²</text>
    <text x="340" y="105" font-size="9" fill="#666">→ 訊號通過順暢</text>

    <text x="215" y="160" text-anchor="middle" font-size="10" fill="#1b5e20">→ 串聯兩個低 barrier 比單一高 barrier 容易</text>
  </g>

  <!-- ====== Bottom: 3-stage Ti-as-liner integration ====== -->
  <text x="550" y="288" text-anchor="middle" font-weight="bold" font-size="13" fill="#37474f">② Ti-based silicide-as-liner 三階段整合（N7+ 主流）</text>

  <!-- Stage 1: After MD trench + pre-clean -->
  <g transform="translate(60, 305)">
    <rect x="0" y="0" width="320" height="240" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="160" y="18" text-anchor="middle" font-weight="bold" font-size="12" fill="#37474f">① MD trench + Pre-clean</text>

    <!-- Outer ILD -->
    <rect x="20" y="40" width="280" height="170" fill="url(#hSiO2s)" stroke="#1976d2"/>

    <!-- Trench in middle -->
    <rect x="120" y="40" width="80" height="155" fill="#ffffff" stroke="#0d47a1" stroke-width="1.5"/>

    <!-- S/D epi at bottom -->
    <polygon points="120,195 160,170 200,195" fill="#fff59d" stroke="#f9a825"/>
    <text x="160" y="190" text-anchor="middle" font-size="9" fill="#5d4037">S/D epi</text>

    <!-- Substrate -->
    <rect x="20" y="210" width="280" height="20" fill="#e0e0e0" stroke="#616161"/>

    <!-- Labels -->
    <text x="60" y="100" font-size="9" fill="#0d47a1">ILD（SiO2）</text>
    <text x="240" y="100" font-size="9" fill="#0d47a1">ILD（SiO2）</text>
    <text x="160" y="80" text-anchor="middle" font-size="10" fill="#37474f" font-weight="bold">trench（空）</text>

    <!-- Annotations -->
    <text x="160" y="140" text-anchor="middle" font-size="9" fill="#1b5e20">epi 表面：</text>
    <text x="160" y="153" text-anchor="middle" font-size="9" fill="#1b5e20">native oxide 已去除</text>
    <text x="160" y="166" text-anchor="middle" font-size="9" fill="#1b5e20">polymer 清乾淨</text>
  </g>

  <!-- Stage 2: Ti dep + TiN cap -->
  <g transform="translate(390, 305)">
    <rect x="0" y="0" width="320" height="240" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="160" y="18" text-anchor="middle" font-weight="bold" font-size="12" fill="#37474f">② Ti dep + TiN cap + RTA</text>

    <rect x="20" y="40" width="280" height="170" fill="url(#hSiO2s)" stroke="#1976d2"/>

    <!-- Ti layer on sidewall + bottom (orange-ish) -->
    <path d="M 120 40 L 120 195 L 160 170 L 200 195 L 200 40 Z" fill="none" stroke="#bf360c" stroke-width="3"/>
    <text x="115" y="120" text-anchor="end" font-size="9" fill="#bf360c">Ti 金屬（側壁）</text>
    <line x1="115" y1="120" x2="122" y2="120" stroke="#bf360c"/>

    <!-- TiSix forms at the bottom (where Ti meets Si/epi) -->
    <polygon points="120,195 160,170 200,195" fill="#ffb74d" stroke="#e65100" stroke-width="1.5"/>
    <text x="160" y="186" text-anchor="middle" font-size="9" fill="#5d4037" font-weight="bold">TiSix</text>

    <!-- TiN cap on top of Ti (thinner blue-ish strip inside) -->
    <path d="M 124 44 L 124 192 L 160 175 L 196 192 L 196 44 Z" fill="none" stroke="#37474f" stroke-width="2" stroke-dasharray="3,1.5"/>
    <text x="205" y="75" font-size="9" fill="#37474f">TiN cap（barrier）</text>
    <line x1="205" y1="72" x2="196" y2="72" stroke="#37474f"/>

    <!-- Substrate -->
    <rect x="20" y="210" width="280" height="20" fill="#e0e0e0" stroke="#616161"/>

    <text x="60" y="100" font-size="9" fill="#0d47a1">ILD</text>
    <text x="240" y="100" font-size="9" fill="#0d47a1">ILD</text>

    <!-- Reaction note -->
    <text x="160" y="225" text-anchor="middle" font-size="9" fill="#1b5e20">Ti 接到 epi 處反應成 TiSix，側壁的 Ti 保留為金屬</text>
  </g>

  <!-- Stage 3: W/Co fill -->
  <g transform="translate(720, 305)">
    <rect x="0" y="0" width="320" height="240" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="160" y="18" text-anchor="middle" font-weight="bold" font-size="12" fill="#37474f">③ W / Co fill 完成</text>

    <rect x="20" y="40" width="280" height="170" fill="url(#hSiO2s)" stroke="#1976d2"/>

    <!-- Ti / TiN liner outline -->
    <path d="M 120 40 L 120 195 L 160 170 L 200 195 L 200 40 Z" fill="none" stroke="#bf360c" stroke-width="3"/>

    <!-- W/Co fill in the middle -->
    <path d="M 124 44 L 124 192 L 160 175 L 196 192 L 196 44 Z" fill="#9e9e9e" stroke="#212121"/>
    <text x="160" y="110" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">W / Co</text>
    <text x="160" y="124" text-anchor="middle" font-size="9" fill="#fff">contact fill</text>

    <!-- TiSix at bottom (visible) -->
    <polygon points="120,195 160,170 200,195" fill="#ffb74d" stroke="#e65100" stroke-width="1.5"/>
    <text x="160" y="186" text-anchor="middle" font-size="9" fill="#5d4037" font-weight="bold">TiSix</text>

    <rect x="20" y="210" width="280" height="20" fill="#e0e0e0" stroke="#616161"/>

    <text x="60" y="100" font-size="9" fill="#0d47a1">ILD</text>
    <text x="240" y="100" font-size="9" fill="#0d47a1">ILD</text>

    <text x="160" y="225" text-anchor="middle" font-size="9" fill="#37474f">Ti 兼任「silicide 來源 + 對 W/Co 的 liner」—— 不必拿掉</text>
  </g>

  <!-- Bottom note -->
  <g transform="translate(60, 555)">
    <text x="490" y="13" text-anchor="middle" font-size="10" fill="#666">最不可逆的工序：silicide 一旦反應出來，組成、形貌、厚度就固定 —— pre-clean 與 anneal 的 SPC 是命門</text>
  </g>
</svg>
