<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="sans-serif" font-size="12">
  <title>MD etch vs. MP etch：對 SAC cap 的矛盾需求 + MP overlay 失效</title>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <defs>
    <pattern id="hSiO2m" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#90caf9" stroke-width="2"/>
    </pattern>
    <marker id="arrM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#37474f"/>
    </marker>
  </defs>

  <text x="550" y="24" text-anchor="middle" font-weight="bold" font-size="16">MD etch vs. MP etch：對 SAC cap 的矛盾需求</text>
  <text x="550" y="42" text-anchor="middle" font-size="11" fill="#555">同一個 SAC cap，MD 要把它當盾牌、MP 要把它打穿 —— 化學配方必須對立</text>

  <!-- ============ Top: MD vs MP side-by-side ============ -->
  <!-- MD etch panel -->
  <g transform="translate(40, 70)">
    <rect x="0" y="0" width="500" height="230" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="250" y="20" text-anchor="middle" font-weight="bold" font-size="13" fill="#1b5e20">MD etch：保護 SAC cap、穿透 ILD 到 S/D</text>

    <!-- ILD1 top -->
    <rect x="20" y="40" width="460" height="30" fill="url(#hSiO2m)" stroke="#1976d2"/>
    <text x="32" y="58" font-size="9" fill="#0d47a1">ILD1</text>

    <!-- substrate -->
    <rect x="20" y="190" width="460" height="25" fill="#e0e0e0" stroke="#616161"/>

    <!-- Layers under FEOL surface -->
    <!-- Left S/D area -->
    <rect x="20" y="70" width="120" height="120" fill="url(#hSiO2m)" stroke="#1976d2"/>
    <text x="80" y="135" text-anchor="middle" font-size="10" fill="#0d47a1">ILD0</text>
    <!-- Gate stack center -->
    <rect x="140" y="70" width="10" height="120" fill="#aed581" stroke="#33691e"/>
    <rect x="150" y="120" width="60" height="70" fill="#ff8a65" stroke="#bf360c"/>
    <text x="180" y="160" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">MG</text>
    <rect x="150" y="70" width="60" height="50" fill="#aed581" stroke="#33691e" stroke-width="1.5"/>
    <text x="180" y="100" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="bold">SAC cap</text>
    <rect x="210" y="70" width="10" height="120" fill="#aed581" stroke="#33691e"/>
    <!-- Right S/D area (intended MD target) -->
    <rect x="220" y="70" width="260" height="120" fill="url(#hSiO2m)" stroke="#1976d2"/>
    <text x="350" y="135" text-anchor="middle" font-size="10" fill="#0d47a1">ILD0 (right S/D area)</text>

    <!-- Silicide on S/D -->
    <rect x="240" y="186" width="220" height="6" fill="#ffb74d" stroke="#e65100"/>

    <!-- MD opening (designed over right S/D) -->
    <rect x="280" y="40" width="80" height="30" fill="#fff8e1" stroke="#f57f17" stroke-width="1.5" stroke-dasharray="4,2"/>
    <rect x="280" y="70" width="80" height="120" fill="#fff8e1" stroke="#f57f17" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="320" y="56" text-anchor="middle" font-size="9" fill="#f57f17">MD 開口</text>

    <!-- Cap stays intact -->
    <line x1="150" y1="65" x2="210" y2="65" stroke="#1b5e20" stroke-width="2"/>
    <text x="180" y="60" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">cap 完整 ✓</text>

    <!-- Etch chemistry box -->
    <rect x="30" y="201" width="220" height="22" fill="#e8f5e9" stroke="#1b5e20"/>
    <text x="40" y="216" font-size="10" fill="#1b5e20"><tspan font-weight="bold">化學：</tspan>SiO2:SiN ≥ 15:1（SiN 慢）</text>
  </g>

  <!-- MP etch panel -->
  <g transform="translate(560, 70)">
    <rect x="0" y="0" width="500" height="230" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="250" y="20" text-anchor="middle" font-weight="bold" font-size="13" fill="#c62828">MP etch：必須把 SAC cap 打穿、接到 MG</text>

    <rect x="20" y="40" width="460" height="30" fill="url(#hSiO2m)" stroke="#1976d2"/>
    <text x="32" y="58" font-size="9" fill="#0d47a1">ILD1</text>

    <rect x="20" y="190" width="460" height="25" fill="#e0e0e0" stroke="#616161"/>

    <rect x="20" y="70" width="220" height="120" fill="url(#hSiO2m)" stroke="#1976d2"/>
    <text x="130" y="135" text-anchor="middle" font-size="10" fill="#0d47a1">ILD0</text>
    <rect x="240" y="70" width="10" height="120" fill="#aed581" stroke="#33691e"/>
    <rect x="250" y="120" width="60" height="70" fill="#ff8a65" stroke="#bf360c"/>
    <text x="280" y="160" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">MG</text>
    <!-- SAC cap (will be pierced) -->
    <rect x="250" y="70" width="60" height="50" fill="#aed581" stroke="#33691e" stroke-width="1.5"/>
    <text x="280" y="95" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="bold">SAC cap</text>
    <rect x="310" y="70" width="10" height="120" fill="#aed581" stroke="#33691e"/>
    <rect x="320" y="70" width="160" height="120" fill="url(#hSiO2m)" stroke="#1976d2"/>
    <text x="400" y="135" text-anchor="middle" font-size="10" fill="#0d47a1">ILD0</text>

    <!-- MP opening (designed over gate) -->
    <rect x="252" y="40" width="56" height="30" fill="#ffebee" stroke="#c62828" stroke-width="1.5" stroke-dasharray="4,2"/>
    <!-- pierces through cap -->
    <rect x="252" y="70" width="56" height="50" fill="#ffebee" stroke="#c62828" stroke-width="1.5" stroke-dasharray="4,2"/>
    <!-- Cap break indication -->
    <line x1="252" y1="120" x2="308" y2="120" stroke="#c62828" stroke-width="2"/>
    <text x="280" y="56" text-anchor="middle" font-size="9" fill="#c62828">MP 開口</text>
    <text x="280" y="113" text-anchor="middle" font-size="9" fill="#c62828" font-weight="bold">cap 被打穿</text>

    <!-- Etch chemistry box -->
    <rect x="30" y="201" width="220" height="22" fill="#ffebee" stroke="#c62828"/>
    <text x="40" y="216" font-size="10" fill="#c62828"><tspan font-weight="bold">化學：</tspan>SiO2:SiN 較低（SiN 也要打）</text>
  </g>

  <!-- Vs symbol between panels -->
  <text x="550" y="195" text-anchor="middle" font-size="20" font-weight="bold" fill="#5d4037">⇄</text>

  <!-- ============ Bottom: MP overlay失效情境 ============ -->
  <text x="550" y="335" text-anchor="middle" font-weight="bold" font-size="13" fill="#37474f">MP overlay 容錯：偏向 S/D 側 → cap+spacer+CESL 全被打穿 → gate↔S/D short</text>

  <g transform="translate(60, 350)">
    <rect x="0" y="0" width="470" height="180" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="235" y="18" text-anchor="middle" font-weight="bold" font-size="12" fill="#1b5e20">理想 MP：對到 gate 正上方</text>

    <rect x="20" y="35" width="430" height="25" fill="url(#hSiO2m)" stroke="#1976d2"/>
    <rect x="20" y="60" width="180" height="80" fill="url(#hSiO2m)" stroke="#1976d2"/>
    <rect x="200" y="60" width="10" height="80" fill="#aed581" stroke="#33691e"/>
    <rect x="210" y="90" width="50" height="50" fill="#ff8a65" stroke="#bf360c"/>
    <text x="235" y="118" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">MG</text>
    <rect x="210" y="60" width="50" height="30" fill="#aed581" stroke="#33691e" stroke-width="1.5"/>
    <text x="235" y="78" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">cap</text>
    <rect x="260" y="60" width="10" height="80" fill="#aed581" stroke="#33691e"/>
    <rect x="270" y="60" width="180" height="80" fill="url(#hSiO2m)" stroke="#1976d2"/>
    <rect x="20" y="140" width="430" height="20" fill="#e0e0e0" stroke="#616161"/>

    <!-- MP opening centered -->
    <rect x="212" y="35" width="46" height="25" fill="#ffebee" stroke="#c62828" stroke-dasharray="3,2"/>
    <rect x="212" y="60" width="46" height="30" fill="#ffebee" stroke="#c62828" stroke-dasharray="3,2"/>
    <text x="235" y="50" text-anchor="middle" font-size="9" fill="#c62828">MP 開口</text>
    <text x="235" y="32" text-anchor="middle" font-size="9" fill="#1b5e20">✓ 接到 MG</text>
  </g>

  <g transform="translate(570, 350)">
    <rect x="0" y="0" width="470" height="180" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="235" y="18" text-anchor="middle" font-weight="bold" font-size="12" fill="#c62828">Mask 偏向右 S/D 側：cap + spacer + CESL 全被穿</text>

    <rect x="20" y="35" width="430" height="25" fill="url(#hSiO2m)" stroke="#1976d2"/>
    <rect x="20" y="60" width="180" height="80" fill="url(#hSiO2m)" stroke="#1976d2"/>
    <rect x="200" y="60" width="10" height="80" fill="#aed581" stroke="#33691e"/>
    <rect x="210" y="90" width="50" height="50" fill="#ff8a65" stroke="#bf360c"/>
    <text x="235" y="118" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">MG</text>
    <rect x="210" y="60" width="50" height="30" fill="#aed581" stroke="#33691e" stroke-width="1.5"/>
    <rect x="260" y="60" width="10" height="80" fill="#aed581" stroke="#33691e"/>
    <rect x="270" y="60" width="180" height="80" fill="url(#hSiO2m)" stroke="#1976d2"/>
    <rect x="20" y="140" width="430" height="20" fill="#e0e0e0" stroke="#616161"/>
    <rect x="270" y="134" width="180" height="6" fill="#ffb74d" stroke="#e65100"/>

    <!-- MP opening shifted right (over right spacer + S/D area) -->
    <rect x="252" y="35" width="46" height="25" fill="#ffebee" stroke="#c62828" stroke-width="1.5" stroke-dasharray="3,2"/>
    <rect x="252" y="60" width="46" height="80" fill="#ffebee" stroke="#c62828" stroke-width="1.5" stroke-dasharray="3,2"/>
    <!-- shift arrow -->
    <line x1="235" y1="48" x2="275" y2="48" stroke="#c62828" stroke-width="1" marker-end="url(#arrM)"/>
    <text x="255" y="40" text-anchor="middle" font-size="9" fill="#c62828">mask 偏</text>

    <!-- Damage indicator: cap, spacer, CESL all pierced in overlap region -->
    <line x1="252" y1="90" x2="270" y2="90" stroke="#c62828" stroke-width="2.5"/>
    <text x="285" y="76" font-size="14" fill="#c62828" font-weight="bold">⚡</text>
    <text x="305" y="78" font-size="9" fill="#c62828">cap+spacer 被打穿</text>
    <text x="305" y="92" font-size="9" fill="#c62828">→ MP 觸到 S/D / 邊角</text>
    <text x="235" y="172" text-anchor="middle" font-size="10" fill="#c62828" font-weight="bold">→ gate-to-S/D short（MDMG short 的對偶情境）</text>
  </g>

  <!-- Footer -->
  <text x="550" y="555" text-anchor="middle" font-size="10" fill="#666">MP 的 overlay 容錯比 MD 更小，因為 MP 化學本來就「不選擇 SiN」</text>
</svg>
