<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" font-family="sans-serif" font-size="12">
  <title>V0 Via Etch：理想 landing vs. punch-through 與 ESL 的角色</title>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <defs>
    <pattern id="hSiO2v" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#90caf9" stroke-width="2"/>
    </pattern>
    <marker id="arrV" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#37474f"/>
    </marker>
  </defs>

  <text x="550" y="24" text-anchor="middle" font-weight="bold" font-size="16">V0 Via Etch：理想 landing、Punch-Through 與 ESL 的角色</text>
  <text x="550" y="42" text-anchor="middle" font-size="11" fill="#555">高 AR via（~5:1）落在 MD/MP 上；對位偏 + 沒 ESL → 蝕穿到 SAC cap → 深層 short</text>

  <!-- ============ Three panels ============ -->

  <!-- Panel 1: Ideal V0 landing -->
  <g transform="translate(40, 70)">
    <rect x="0" y="0" width="340" height="380" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="170" y="20" text-anchor="middle" font-weight="bold" font-size="13" fill="#1b5e20">① 理想對位：V0 落在 MD 中央</text>

    <!-- top: V0 ILD -->
    <rect x="20" y="40" width="300" height="80" fill="url(#hSiO2v)" stroke="#1976d2"/>
    <text x="30" y="58" font-size="9" fill="#0d47a1">V0 ILD（low-k 開始進場）</text>

    <!-- MD/MP plane underneath -->
    <!-- ILD1 left -->
    <rect x="20" y="120" width="80" height="60" fill="url(#hSiO2v)" stroke="#1976d2"/>
    <text x="60" y="155" text-anchor="middle" font-size="9" fill="#0d47a1">ILD1</text>
    <!-- MD bar (W/Co fill) -->
    <rect x="100" y="120" width="100" height="60" fill="#9e9e9e" stroke="#212121"/>
    <text x="150" y="155" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">MD（W/Co）</text>
    <!-- ILD1 right -->
    <rect x="200" y="120" width="120" height="60" fill="url(#hSiO2v)" stroke="#1976d2"/>
    <text x="260" y="155" text-anchor="middle" font-size="9" fill="#0d47a1">ILD1</text>

    <!-- Beneath: SAC cap / MG / spacer / S/D area (simplified) -->
    <rect x="20" y="180" width="60" height="100" fill="url(#hSiO2v)" stroke="#1976d2" opacity="0.6"/>
    <rect x="80" y="180" width="10" height="100" fill="#aed581" stroke="#33691e"/>
    <rect x="90" y="200" width="40" height="80" fill="#ff8a65" stroke="#bf360c"/>
    <text x="110" y="245" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">MG</text>
    <rect x="90" y="180" width="40" height="20" fill="#aed581" stroke="#33691e" stroke-width="1.2"/>
    <text x="110" y="194" text-anchor="middle" font-size="8" fill="#1b5e20">cap</text>
    <rect x="130" y="180" width="10" height="100" fill="#aed581" stroke="#33691e"/>
    <rect x="140" y="180" width="80" height="100" fill="url(#hSiO2v)" stroke="#1976d2" opacity="0.6"/>
    <rect x="220" y="180" width="10" height="100" fill="#aed581" stroke="#33691e"/>
    <rect x="230" y="200" width="40" height="80" fill="#ff8a65" stroke="#bf360c"/>
    <text x="250" y="245" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">MG</text>
    <rect x="230" y="180" width="40" height="20" fill="#aed581" stroke="#33691e" stroke-width="1.2"/>
    <rect x="270" y="180" width="10" height="100" fill="#aed581" stroke="#33691e"/>
    <rect x="280" y="180" width="40" height="100" fill="url(#hSiO2v)" stroke="#1976d2" opacity="0.6"/>

    <!-- substrate -->
    <rect x="20" y="280" width="300" height="20" fill="#e0e0e0" stroke="#616161"/>

    <!-- Via shape (lands on MD) -->
    <rect x="138" y="40" width="24" height="80" fill="#fff8e1" stroke="#1b5e20" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="150" y="35" text-anchor="middle" font-size="9" fill="#1b5e20">V0</text>
    <!-- Landing zone marker -->
    <line x1="138" y1="120" x2="162" y2="120" stroke="#1b5e20" stroke-width="2.5"/>
    <text x="150" y="135" text-anchor="middle" font-size="14" fill="#1b5e20" font-weight="bold">✓</text>

    <text x="170" y="315" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="bold">→ 蝕刻停在 MD 金屬上</text>
    <text x="170" y="332" text-anchor="middle" font-size="10" fill="#1b5e20">→ 介面乾淨、Rc 在規格內</text>
    <text x="170" y="349" text-anchor="middle" font-size="10" fill="#1b5e20">→ 後續 fill W/Cu 正常</text>
  </g>

  <!-- Panel 2: Punch-through (no ESL) -->
  <g transform="translate(395, 70)">
    <rect x="0" y="0" width="340" height="380" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="170" y="20" text-anchor="middle" font-weight="bold" font-size="13" fill="#c62828">② 對位偏 + 沒 ESL → punch-through</text>

    <rect x="20" y="40" width="300" height="80" fill="url(#hSiO2v)" stroke="#1976d2"/>
    <text x="30" y="58" font-size="9" fill="#0d47a1">V0 ILD（無 ESL 緩衝）</text>

    <rect x="20" y="120" width="80" height="60" fill="url(#hSiO2v)" stroke="#1976d2"/>
    <text x="60" y="155" text-anchor="middle" font-size="9" fill="#0d47a1">ILD1</text>
    <rect x="100" y="120" width="100" height="60" fill="#9e9e9e" stroke="#212121"/>
    <text x="150" y="155" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">MD</text>
    <rect x="200" y="120" width="120" height="60" fill="url(#hSiO2v)" stroke="#1976d2"/>
    <text x="260" y="155" text-anchor="middle" font-size="9" fill="#0d47a1">ILD1</text>

    <rect x="20" y="180" width="60" height="100" fill="url(#hSiO2v)" stroke="#1976d2" opacity="0.6"/>
    <rect x="80" y="180" width="10" height="100" fill="#aed581" stroke="#33691e"/>
    <rect x="90" y="200" width="40" height="80" fill="#ff8a65" stroke="#bf360c"/>
    <text x="110" y="245" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">MG</text>
    <rect x="90" y="180" width="40" height="20" fill="#aed581" stroke="#33691e" stroke-width="1.2"/>
    <text x="110" y="194" text-anchor="middle" font-size="8" fill="#1b5e20">cap</text>
    <rect x="130" y="180" width="10" height="100" fill="#aed581" stroke="#33691e"/>
    <rect x="140" y="180" width="80" height="100" fill="url(#hSiO2v)" stroke="#1976d2" opacity="0.6"/>
    <rect x="220" y="180" width="10" height="100" fill="#aed581" stroke="#33691e"/>
    <rect x="230" y="200" width="40" height="80" fill="#ff8a65" stroke="#bf360c"/>
    <rect x="230" y="180" width="40" height="20" fill="#aed581" stroke="#33691e" stroke-width="1.2"/>
    <rect x="270" y="180" width="10" height="100" fill="#aed581" stroke="#33691e"/>
    <rect x="280" y="180" width="40" height="100" fill="url(#hSiO2v)" stroke="#1976d2" opacity="0.6"/>

    <rect x="20" y="280" width="300" height="20" fill="#e0e0e0" stroke="#616161"/>

    <!-- Misaligned via shape: top is offset, extends down past MD into ILD1 below -->
    <!-- Top opening shifted right -->
    <rect x="186" y="40" width="24" height="80" fill="#fff8e1" stroke="#c62828" stroke-width="2" stroke-dasharray="4,2"/>
    <!-- The misaligned portion overlaps mostly ILD (right of MD edge x=200) -->
    <rect x="200" y="120" width="10" height="80" fill="#fff8e1" stroke="#c62828" stroke-width="2" stroke-dasharray="4,2"/>
    <!-- Reaches cap/MG -->
    <line x1="200" y1="200" x2="210" y2="200" stroke="#c62828" stroke-width="3"/>
    <text x="240" y="195" font-size="14" fill="#c62828" font-weight="bold">⚡</text>

    <!-- shift arrow -->
    <line x1="160" y1="35" x2="200" y2="35" stroke="#c62828" stroke-width="1" marker-end="url(#arrV)"/>
    <text x="180" y="30" text-anchor="middle" font-size="9" fill="#c62828">overlay 偏</text>

    <text x="170" y="315" text-anchor="middle" font-size="10" fill="#c62828" font-weight="bold">→ Via 邊角錯過 MD</text>
    <text x="170" y="332" text-anchor="middle" font-size="10" fill="#c62828">→ 繼續往下穿過 ILD1</text>
    <text x="170" y="349" text-anchor="middle" font-size="10" fill="#c62828">→ 觸到 SAC cap 邊角 / MG → short</text>
  </g>

  <!-- Panel 3: With ESL -->
  <g transform="translate(750, 70)">
    <rect x="0" y="0" width="310" height="380" fill="#fafafa" stroke="#bdbdbd"/>
    <text x="155" y="20" text-anchor="middle" font-weight="bold" font-size="13" fill="#1b5e20">③ 同樣偏移 + 有 ESL → 安全</text>

    <rect x="20" y="40" width="270" height="74" fill="url(#hSiO2v)" stroke="#1976d2"/>
    <text x="30" y="58" font-size="9" fill="#0d47a1">V0 ILD</text>

    <!-- ESL layer (SiN/AlN/SiCN) -->
    <rect x="20" y="114" width="270" height="6" fill="#aed581" stroke="#33691e" stroke-width="1"/>
    <text x="155" y="111" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">ESL（SiN/AlN/SiCN）</text>

    <rect x="20" y="120" width="80" height="60" fill="url(#hSiO2v)" stroke="#1976d2"/>
    <text x="60" y="155" text-anchor="middle" font-size="9" fill="#0d47a1">ILD1</text>
    <rect x="100" y="120" width="80" height="60" fill="#9e9e9e" stroke="#212121"/>
    <text x="140" y="155" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">MD</text>
    <rect x="180" y="120" width="110" height="60" fill="url(#hSiO2v)" stroke="#1976d2"/>
    <text x="235" y="155" text-anchor="middle" font-size="9" fill="#0d47a1">ILD1</text>

    <rect x="20" y="180" width="60" height="100" fill="url(#hSiO2v)" stroke="#1976d2" opacity="0.6"/>
    <rect x="80" y="180" width="10" height="100" fill="#aed581" stroke="#33691e"/>
    <rect x="90" y="200" width="40" height="80" fill="#ff8a65" stroke="#bf360c"/>
    <text x="110" y="245" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">MG</text>
    <rect x="90" y="180" width="40" height="20" fill="#aed581" stroke="#33691e" stroke-width="1.2"/>
    <text x="110" y="194" text-anchor="middle" font-size="8" fill="#1b5e20">cap</text>
    <rect x="130" y="180" width="10" height="100" fill="#aed581" stroke="#33691e"/>
    <rect x="140" y="180" width="60" height="100" fill="url(#hSiO2v)" stroke="#1976d2" opacity="0.6"/>
    <rect x="200" y="180" width="10" height="100" fill="#aed581" stroke="#33691e"/>
    <rect x="210" y="200" width="40" height="80" fill="#ff8a65" stroke="#bf360c"/>
    <rect x="210" y="180" width="40" height="20" fill="#aed581" stroke="#33691e" stroke-width="1.2"/>
    <rect x="250" y="180" width="10" height="100" fill="#aed581" stroke="#33691e"/>
    <rect x="260" y="180" width="30" height="100" fill="url(#hSiO2v)" stroke="#1976d2" opacity="0.6"/>

    <rect x="20" y="280" width="270" height="20" fill="#e0e0e0" stroke="#616161"/>

    <!-- Via shape: same misalignment, but ESL stops the over-etch portion -->
    <rect x="168" y="40" width="24" height="74" fill="#fff8e1" stroke="#1b5e20" stroke-width="2" stroke-dasharray="4,2"/>
    <!-- Portion lands on MD (good) -->
    <rect x="168" y="120" width="12" height="60" fill="#fff8e1" stroke="#1b5e20" stroke-width="2" stroke-dasharray="4,2"/>
    <!-- Portion that would punch through: stops on ESL -->
    <line x1="180" y1="114" x2="192" y2="114" stroke="#1b5e20" stroke-width="3"/>
    <text x="200" y="113" font-size="14" fill="#1b5e20" font-weight="bold">✓</text>
    <text x="210" y="115" font-size="9" fill="#1b5e20">ESL 擋住</text>

    <text x="155" y="315" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="bold">→ Via 大部分落在 MD</text>
    <text x="155" y="332" text-anchor="middle" font-size="10" fill="#1b5e20">→ 偏移部分被 ESL 攔下</text>
    <text x="155" y="349" text-anchor="middle" font-size="10" fill="#1b5e20">→ 不會觸及 gate stack</text>
  </g>

  <!-- Bottom note -->
  <g transform="translate(40, 470)">
    <rect x="0" y="0" width="1020" height="50" fill="#fff8e1" stroke="#f9a825"/>
    <text x="10" y="20" font-weight="bold" font-size="12" fill="#5d4037">ESL 的取捨：</text>
    <text x="100" y="20" font-size="10" fill="#444">擋住 punch-through、提供 endpoint 訊號；但多一層介電會增加電容，與 low-k 趨勢衝突</text>
    <text x="10" y="40" font-size="10" fill="#666">N7 以下許多製程選擇「無 ESL + 精準 endpoint detection」，靠 MD CMP dishing 控制 + via etch chamber 穩定度避免 punch-through</text>
  </g>
</svg>
