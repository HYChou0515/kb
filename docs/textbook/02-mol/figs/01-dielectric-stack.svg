<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" font-family="sans-serif" font-size="12">
  <title>MOL Dielectric Stack：SiN 保護傘 + SiO2 蝕刻路徑</title>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <defs>
    <pattern id="hSiO2" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#90caf9" stroke-width="2"/>
    </pattern>
    <pattern id="hSiN" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(-45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#66bb6a" stroke-width="1.6"/>
    </pattern>
  </defs>

  <text x="500" y="24" text-anchor="middle" font-weight="bold" font-size="16">MOL 起點：FEOL 留下的介電堆疊（沿 fin 方向剖面）</text>
  <text x="500" y="42" text-anchor="middle" font-size="11" fill="#555">藍色斜線=SiO2（蝕刻路徑）　綠色斜線=SiN（保護傘）　橘紅=金屬閘　黃=silicide 預定區</text>

  <!-- Main cross-section -->
  <g transform="translate(60, 70)">
    <rect x="0" y="0" width="700" height="370" fill="#fafafa" stroke="#bdbdbd"/>

    <!-- Si substrate -->
    <rect x="20" y="310" width="660" height="50" fill="#e0e0e0" stroke="#616161"/>
    <text x="40" y="340" font-size="10" fill="#424242">Si substrate</text>

    <!-- Three fins under three gates -->
    <!-- fin/SD epi shapes -->
    <g fill="#fff59d" stroke="#f9a825">
      <!-- Between gate 1 and gate 2 (left S/D) -->
      <polygon points="180,310 230,275 280,310"/>
      <text x="230" y="305" text-anchor="middle" font-size="9" fill="#5d4037">S/D epi</text>
      <!-- Between gate 2 and gate 3 (right S/D) -->
      <polygon points="420,310 470,275 520,310"/>
      <text x="470" y="305" text-anchor="middle" font-size="9" fill="#5d4037">S/D epi</text>
      <!-- Far left (edge S/D) -->
      <polygon points="30,310 80,290 130,310"/>
      <!-- Far right -->
      <polygon points="570,310 620,290 670,310"/>
    </g>

    <!-- CESL (SiN thin layer wrapping ILD0 bottom + epi) -->
    <path d="M 20 305 L 130 305 L 180 290 L 230 263 L 280 290 L 330 305 L 370 305 L 420 290 L 470 263 L 520 290 L 570 305 L 620 290 L 670 305 L 680 305"
          fill="none" stroke="#2e7d32" stroke-width="3"/>
    <text x="100" y="280" font-size="9" fill="#1b5e20" font-weight="bold">CESL（SiN）</text>

    <!-- Three gate stacks -->
    <!-- Gate 1 (left) -->
    <g>
      <!-- Spacers -->
      <rect x="130" y="120" width="10" height="190" fill="url(#hSiN)" stroke="#1b5e20"/>
      <rect x="170" y="120" width="10" height="190" fill="url(#hSiN)" stroke="#1b5e20"/>
      <!-- HK + Metal Gate -->
      <rect x="140" y="200" width="30" height="110" fill="#ff8a65" stroke="#bf360c"/>
      <text x="155" y="260" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">MG</text>
      <text x="155" y="273" text-anchor="middle" font-size="8" fill="#fff">+HK</text>
      <!-- SAC cap on top -->
      <rect x="140" y="120" width="30" height="80" fill="url(#hSiN)" stroke="#1b5e20" stroke-width="1.5"/>
      <text x="155" y="165" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">SAC</text>
      <text x="155" y="178" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">cap</text>
    </g>
    <!-- Gate 2 (middle) -->
    <g>
      <rect x="330" y="120" width="10" height="190" fill="url(#hSiN)" stroke="#1b5e20"/>
      <rect x="370" y="120" width="10" height="190" fill="url(#hSiN)" stroke="#1b5e20"/>
      <rect x="340" y="200" width="30" height="110" fill="#ff8a65" stroke="#bf360c"/>
      <text x="355" y="260" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">MG</text>
      <text x="355" y="273" text-anchor="middle" font-size="8" fill="#fff">+HK</text>
      <rect x="340" y="120" width="30" height="80" fill="url(#hSiN)" stroke="#1b5e20" stroke-width="1.5"/>
      <text x="355" y="165" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">SAC</text>
      <text x="355" y="178" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">cap</text>
    </g>
    <!-- Gate 3 (right) -->
    <g>
      <rect x="530" y="120" width="10" height="190" fill="url(#hSiN)" stroke="#1b5e20"/>
      <rect x="570" y="120" width="10" height="190" fill="url(#hSiN)" stroke="#1b5e20"/>
      <rect x="540" y="200" width="30" height="110" fill="#ff8a65" stroke="#bf360c"/>
      <text x="555" y="260" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">MG</text>
      <text x="555" y="273" text-anchor="middle" font-size="8" fill="#fff">+HK</text>
      <rect x="540" y="120" width="30" height="80" fill="url(#hSiN)" stroke="#1b5e20" stroke-width="1.5"/>
      <text x="555" y="165" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">SAC</text>
      <text x="555" y="178" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">cap</text>
    </g>

    <!-- ILD0 fills between gate stacks from CESL up to SAC cap/spacer top (y=120) -->
    <path d="M 20 305 L 130 305 L 130 120 L 180 120 L 180 305 L 330 305 L 330 120 L 380 120 L 380 305 L 530 305 L 530 120 L 580 120 L 580 305 L 680 305 L 680 120 L 20 120 Z"
          fill="url(#hSiO2)" stroke="#0d47a1"/>
    <text x="255" y="220" text-anchor="middle" font-size="11" fill="#0d47a1" font-weight="bold">ILD0 (SiO2)</text>
    <text x="455" y="220" text-anchor="middle" font-size="11" fill="#0d47a1" font-weight="bold">ILD0 (SiO2)</text>
    <text x="255" y="235" text-anchor="middle" font-size="8" fill="#0d47a1">FEOL 沉積（HARP/FCVD）</text>
    <text x="455" y="235" text-anchor="middle" font-size="8" fill="#0d47a1">FEOL 沉積（HARP/FCVD）</text>

    <!-- ILD1 / PMD：MOL 第一步追加的 SiO2 層，疊在 ILD0 + SAC cap 的 flush 表面上 -->
    <rect x="20" y="60" width="660" height="60" fill="url(#hSiO2)" stroke="#0d47a1"/>
    <text x="350" y="88" text-anchor="middle" font-size="12" fill="#0d47a1" font-weight="bold">ILD1 / PMD (SiO2)</text>
    <text x="350" y="103" text-anchor="middle" font-size="9" fill="#0d47a1">MOL 第一步沉積（PEOX/TEOS）—— 與 ILD0 同為 SiO2，但分屬不同製程步</text>
    <!-- ILD0 / ILD1 boundary indicator -->
    <line x1="20" y1="120" x2="680" y2="120" stroke="#0d47a1" stroke-width="0.8" stroke-dasharray="4,2"/>

    <!-- Top: future MD/MP photo direction arrows -->
    <text x="350" y="50" text-anchor="middle" font-size="10" fill="#37474f">↓ MOL 階段 MD/MP etch 從這個表面開始往下打 ↓</text>

    <!-- Labels: identify regions for selectivity -->
    <line x1="155" y1="118" x2="155" y2="110" stroke="#1b5e20"/>
    <line x1="155" y1="110" x2="100" y2="105" stroke="#1b5e20"/>
    <text x="40" y="103" font-size="9" fill="#1b5e20" font-weight="bold">SiN 保護：頂端 cap</text>

    <line x1="135" y1="220" x2="105" y2="220" stroke="#1b5e20"/>
    <text x="100" y="223" text-anchor="end" font-size="9" fill="#1b5e20" font-weight="bold">SiN 保護：側壁 spacer</text>

    <line x1="240" y1="307" x2="240" y2="295" stroke="#1b5e20"/>
    <line x1="240" y1="295" x2="200" y2="288" stroke="#1b5e20"/>
    <text x="195" y="288" text-anchor="end" font-size="9" fill="#1b5e20" font-weight="bold">SiN 保護：底層 CESL</text>
  </g>

  <!-- Right side: legend + selectivity logic -->
  <g transform="translate(780, 80)" font-size="11">
    <text x="0" y="0" font-weight="bold" font-size="13" fill="#37474f">材料圖例</text>
    <rect x="0" y="14" width="20" height="14" fill="url(#hSiO2)" stroke="#0d47a1"/>
    <text x="28" y="25" fill="#0d47a1">SiO2（ILD0, ILD1）</text>
    <text x="28" y="38" font-size="9" fill="#666">→ MD etch 化學蝕刻快</text>

    <rect x="0" y="50" width="20" height="14" fill="url(#hSiN)" stroke="#1b5e20"/>
    <text x="28" y="61" fill="#1b5e20">SiN（cap / spacer / CESL）</text>
    <text x="28" y="74" font-size="9" fill="#666">→ MD etch 化學蝕刻慢</text>

    <rect x="0" y="86" width="20" height="14" fill="#ff8a65" stroke="#bf360c"/>
    <text x="28" y="97" fill="#bf360c">Metal Gate + HK</text>

    <rect x="0" y="112" width="20" height="14" fill="#fff59d" stroke="#f9a825"/>
    <text x="28" y="123" fill="#5d4037">S/D epi（silicide 預定區）</text>

    <text x="0" y="160" font-weight="bold" font-size="13" fill="#37474f">SAC 邏輯</text>
    <text x="0" y="180" font-size="10" fill="#444">▶ MD 想接 S/D：</text>
    <text x="10" y="195" font-size="10" fill="#444">　 走 SiO2 路徑（ILD1+ILD0）</text>
    <text x="10" y="210" font-size="10" fill="#444">　 → 切 CESL → 落 S/D</text>

    <text x="0" y="232" font-size="10" fill="#444">▶ 任何 SiN 都應該擋住 etch：</text>
    <text x="10" y="247" font-size="10" fill="#444">　 cap 保護 MG 頂</text>
    <text x="10" y="262" font-size="10" fill="#444">　 spacer 保護 MG 側</text>
    <text x="10" y="277" font-size="10" fill="#444">　 CESL 保護 fin / epi 底</text>

    <text x="0" y="305" font-size="11" font-weight="bold" fill="#c62828">Selectivity 要求：</text>
    <text x="0" y="322" font-size="10" fill="#c62828">SiO2 : SiN ≥ 10:1（先進 ≥ 20:1）</text>
  </g>

  <!-- Bottom: failure summary -->
  <g transform="translate(60, 470)">
    <rect x="0" y="0" width="880" height="50" fill="#fff3e0" stroke="#ef6c00"/>
    <text x="10" y="20" font-weight="bold" font-size="12" fill="#5d4037">介電堆疊任一層失守 →</text>
    <text x="160" y="20" font-size="10" fill="#444">Cap 太薄 → MD etch 打穿 → MDMG short　|　CESL 厚度飄 → MD over-etch 傷 epi → 高 Rc　|　ILD1 particle → MD photo defect → open</text>
    <text x="10" y="40" font-size="10" fill="#666">這些缺陷站內檢測幾乎看不到，要靠介電厚度 SPC 才能事前監控。</text>
  </g>
</svg>
